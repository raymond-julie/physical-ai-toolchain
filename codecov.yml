# Codecov configuration for physical-ai-toolchain.
#
# Flag → Workflow → cwd → coverage scope
# ----------------------------------------------------------------------------
# pytest-training      | pytest-training.yml            | repo root                      | --cov=training
# pytest-dm-tools      | pytest-dm-tools.yml            | repo root                      | --cov=data-management/tools
# pytest-data-pipeline | pytest-data-pipeline.yml       | repo root                      | --cov=data-pipeline/capture
# pytest-inference     | pytest-inference.yml           | repo root                      | --cov=fleet-deployment/inference
# pytest-dataviewer    | dataviewer-backend-pytests.yml | data-management/viewer/backend | --cov=src
# pytest-evaluation    | evaluation-pytests.yml         | evaluation                     | --cov=.
# pytest-fuzz          | fuzz-regression-tests.yml      | repo root                      | --cov=tests --cov=data-management/viewer/backend/src --cov=training
# vitest               | dataviewer-frontend-tests.yml  | data-management/viewer/frontend | vitest --coverage
# vitest-components    | dataviewer-frontend-tests.yml  | data-management/viewer/frontend | subset: src/components/
# vitest-features      | dataviewer-frontend-tests.yml  | data-management/viewer/frontend | subset: src/components/{dashboard,annotation-panel,frame-editor,episode-viewer}/
# vitest-lib           | dataviewer-frontend-tests.yml  | data-management/viewer/frontend | subset: src/lib/
# vitest-state         | dataviewer-frontend-tests.yml  | data-management/viewer/frontend | subset: src/stores/, src/hooks/
# vitest-app           | dataviewer-frontend-tests.yml  | data-management/viewer/frontend | subset: src/App.tsx
# go                   | go-tests.yml                   | infrastructure/terraform/e2e   | go test -cover
# terraform            | terraform-tests.yml            | infrastructure/terraform       | terraform test
# pester               | pester-tests.yml               | repo root                      | Invoke-Pester -CodeCoverage
#
# Flag overlaps (intentional):
#   pytest-fuzz overlaps pytest-training (training/) and pytest-dataviewer (viewer/backend/src/).
#   go ⊂ terraform (infrastructure/terraform/e2e/ ⊂ infrastructure/terraform/);
#     deduplicated at the component layer (infrastructure-terraform vs infrastructure-go-e2e).
#   vitest-* (components/features/lib/state/app) overlap the aggregate vitest flag and each
#     other (vitest-features overlaps vitest-components since the feature directories
#     dashboard/, annotation-panel/, frame-editor/, episode-viewer/ all live under src/components/);
#     intentional to surface per-section coverage trends without losing the aggregate view.

codecov:
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "80...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
      go:
        flags:
          - go
        target: auto
        threshold: 1%
      pester:
        flags:
          - pester
        target: auto
        threshold: 1%
      pytest-training:
        flags:
          - pytest-training
        target: auto
        threshold: 1%
      pytest-dm-tools:
        flags:
          - pytest-dm-tools
        target: auto
        threshold: 1%
      pytest-data-pipeline:
        flags:
          - pytest-data-pipeline
        target: auto
        threshold: 1%
      pytest-inference:
        flags:
          - pytest-inference
        target: auto
        threshold: 1%
      pytest-dataviewer:
        flags:
          - pytest-dataviewer
        target: auto
        threshold: 1%
      pytest-fuzz:
        flags:
          - pytest-fuzz
        target: auto
        threshold: 1%
      terraform:
        flags:
          - terraform
        target: auto
        threshold: 1%
      vitest:
        flags:
          - vitest
        target: auto
        threshold: 1%
      vitest-components:
        flags:
          - vitest-components
        target: auto
        threshold: 1%
      vitest-features:
        flags:
          - vitest-features
        target: auto
        threshold: 1%
      vitest-lib:
        flags:
          - vitest-lib
        target: auto
        threshold: 1%
      vitest-state:
        flags:
          - vitest-state
        target: auto
        threshold: 1%
      vitest-app:
        flags:
          - vitest-app
        target: auto
        threshold: 1%
      pytest-evaluation:
        flags:
          - pytest-evaluation
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 5%
      go:
        flags:
          - go
        informational: true
      pester:
        flags:
          - pester
        informational: true
      pytest-training:
        flags:
          - pytest-training
        informational: true
      pytest-dm-tools:
        flags:
          - pytest-dm-tools
        informational: true
      pytest-data-pipeline:
        flags:
          - pytest-data-pipeline
        informational: true
      pytest-inference:
        flags:
          - pytest-inference
        informational: true
      pytest-dataviewer:
        flags:
          - pytest-dataviewer
        informational: true
      pytest-fuzz:
        flags:
          - pytest-fuzz
        informational: true
      terraform:
        flags:
          - terraform
        informational: true
      vitest:
        flags:
          - vitest
        informational: true
      vitest-components:
        flags:
          - vitest-components
        informational: true
      vitest-features:
        flags:
          - vitest-features
        informational: true
      vitest-lib:
        flags:
          - vitest-lib
        informational: true
      vitest-state:
        flags:
          - vitest-state
        informational: true
      vitest-app:
        flags:
          - vitest-app
        informational: true
      pytest-evaluation:
        flags:
          - pytest-evaluation
        informational: true

flags:
  pytest-training:
    paths:
      - training/
    carryforward: true
  pytest-dm-tools:
    paths:
      - data-management/tools/
    carryforward: true
  pytest-data-pipeline:
    paths:
      - data-pipeline/capture/
    carryforward: true
  pytest-inference:
    paths:
      - fleet-deployment/inference/
    carryforward: true
  pytest-dataviewer:
    paths:
      - data-management/viewer/backend/src/
    carryforward: true
  pytest-fuzz:
    paths:
      - tests/
      - data-management/viewer/backend/src/
      - training/
    carryforward: true
  pytest-evaluation:
    paths:
      - evaluation/
    carryforward: true
  vitest:
    paths:
      - data-management/viewer/frontend/src/
    carryforward: true
  vitest-components:
    paths:
      - data-management/viewer/frontend/src/components/
    carryforward: true
  vitest-features:
  # Most actively developed feature areas tracked individually; remaining components fall under vitest-components.
    paths:
      - data-management/viewer/frontend/src/components/dashboard/
      - data-management/viewer/frontend/src/components/annotation-panel/
      - data-management/viewer/frontend/src/components/frame-editor/
      - data-management/viewer/frontend/src/components/episode-viewer/
    carryforward: true
  vitest-lib:
    paths:
      - data-management/viewer/frontend/src/lib/
      - data-management/viewer/frontend/src/api/
      - data-management/viewer/frontend/src/types/
    carryforward: true
  vitest-state:
    paths:
      - data-management/viewer/frontend/src/stores/
      - data-management/viewer/frontend/src/hooks/
    carryforward: true
  vitest-app:
    paths:
      - data-management/viewer/frontend/src/App.tsx
    carryforward: true
  go:
    paths:
      - infrastructure/terraform/e2e/
    carryforward: true
  terraform:
    paths:
      - infrastructure/terraform/
    carryforward: true
  pester:
    paths:
      - scripts/
    carryforward: true

component_management:
  default_rules:
    statuses:
      - type: project
        target: 80%
        threshold: 1%
      - type: patch
        target: 80%
        threshold: 0%
  individual_components:
    - component_id: training
      name: Training
      paths:
        - training/*.py
        - training/rl/**
        - training/il/**
        - training/vla/**
        - training/pipelines/**
        - training/packaging/**
        - training/utils/**
    - component_id: evaluation
      name: Evaluation
      paths:
        - evaluation/sil/**
        - evaluation/metrics/**
    - component_id: data-pipeline-capture
      name: Data Pipeline / Capture
      paths:
        - data-pipeline/capture/**
        - "!data-pipeline/capture/tests/**"
    - component_id: fleet-deployment-inference
      name: Fleet Deployment / Inference
      paths:
        - fleet-deployment/inference/**
    - component_id: dataviewer-backend
      name: Dataviewer Backend
      paths:
        - data-management/viewer/backend/src/**
    - component_id: dataviewer-backend-routers
      name: Dataviewer Backend / Routers
      paths:
        - data-management/viewer/backend/src/api/routers/**
        - data-management/viewer/backend/src/api/routes/**
    - component_id: dataviewer-backend-services
      name: Dataviewer Backend / Services
      paths:
        - data-management/viewer/backend/src/api/services/**
    - component_id: dataviewer-backend-storage
      name: Dataviewer Backend / Storage
      paths:
        - data-management/viewer/backend/src/api/storage/**
        - data-management/viewer/backend/src/api/models/**
    - component_id: dataviewer-backend-security
      name: Dataviewer Backend / Security
      paths:
        - data-management/viewer/backend/src/api/auth.py
        - data-management/viewer/backend/src/api/csrf.py
        - data-management/viewer/backend/src/api/validation.py
        - data-management/viewer/backend/src/api/rate_limiter.py
        - data-management/viewer/backend/src/api/middleware.py
    - component_id: dataviewer-frontend
      name: Dataviewer Frontend
      paths:
        - data-management/viewer/frontend/src/**
    - component_id: dataviewer-frontend-components
      name: Dataviewer Frontend / Components
      paths:
        - data-management/viewer/frontend/src/components/**
    - component_id: dataviewer-frontend-lib
      name: Dataviewer Frontend / Lib
      paths:
        - data-management/viewer/frontend/src/lib/**
        - data-management/viewer/frontend/src/api/**
        - data-management/viewer/frontend/src/types/**
    - component_id: dataviewer-frontend-state
      name: Dataviewer Frontend / State
      paths:
        - data-management/viewer/frontend/src/stores/**
        - data-management/viewer/frontend/src/hooks/**
    - component_id: data-management-tools
      name: Data Management Tools
      paths:
        - data-management/tools/**
        - "!data-management/tools/tests/**"
    - component_id: infrastructure-terraform
      name: Infrastructure / Terraform
      paths:
        - infrastructure/terraform/**/*.tf
    - component_id: infrastructure-go-e2e
      name: Infrastructure / Go E2E
      paths:
        - infrastructure/terraform/e2e/**/*.go
    - component_id: scripts-pester
      name: Scripts / Pester
      paths:
        - scripts/**/*.ps1
        - scripts/**/*.psm1
    - component_id: fuzz-suite
      name: Fuzz Suite
      paths:
        - tests/fuzz_harness.py
        - tests/fuzz-corpus/**

parsers:
  jacoco:
    partials_as_hits: true

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: false
  show_carryforward_flags: true

ignore:
  - "training/tests/**"
  - "data-management/viewer/backend/tests/**"
  - "data-management/tools/tests/**"
  - "data-pipeline/capture/tests/**"
  - "evaluation/tests/**"
  - "scripts/tests/**"
  - "scripts/security/zap-to-sarif.py"
  - "tests/e2e/**"
  - "fleet-deployment/inference/tests/**"
  - "**/__pycache__/**"
  - "**/.venv/**"
  - "**/node_modules/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "external/**"
  - "docs/**"
  - "workflows/**"
  - "config/**"
  - "logs/**"
