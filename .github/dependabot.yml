# SECURITY FAST LANE — do not throttle or batch security updates.
# `cooldown` applies to version updates only; security updates are unaffected by design.
# Do NOT add `applies-to: security-updates` to any group, especially for runtime/GPU
# packages — it would batch security fixes into the cooldown'd PR and delay them.
version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
    day: monday
  cooldown:
    default-days: 7
    semver-major-days: 14
  groups:
    root-npm-dependencies:
      patterns:
      - "*"
      update-types:
      - minor
      - patch
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - npm
  commit-message:
    prefix: chore
    include: scope
- package-ecosystem: uv
  directory: /
  schedule:
    interval: weekly
    day: monday
  cooldown:
    default-days: 7
    semver-major-days: 14
  groups:
    python-dependencies:
      patterns:
      - "*"
      update-types:
      - minor
      - patch
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - python
  commit-message:
    prefix: chore
    include: scope
- package-ecosystem: uv
  directory: /data-pipeline
  schedule:
