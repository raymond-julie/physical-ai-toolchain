version: 2
updates:
  # npm dependencies for root tooling
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      root-npm-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Python dependencies
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      python-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Python dependencies for training
  - package-ecosystem: "pip"
    directory: "/training/rl"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      training-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"
      - "training"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Python dependencies for imitation learning (LeRobot)
  - package-ecosystem: "pip"
    directory: "/training/il/lerobot"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      lerobot-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"
      - "training"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Python dependencies for evaluation
  - package-ecosystem: "pip"
    directory: "/evaluation"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      inference-dependencies:
        patterns:
          - "*"
    # Upper-bound caps from azure-ai-ml<2 and lerobot<0.6 transitive constraints.
    # Revisit when those packages release versions that lift the caps.
    ignore:
      - dependency-name: "marshmallow"
        versions: [">=4.0.0"]
      - dependency-name: "torch"
        versions: [">=2.11.0"]
      - dependency-name: "numpy"
        versions: [">=2.3.0"]
      - dependency-name: "packaging"
        versions: [">=26.0"]
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Terraform modules
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Terraform DNS module
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform/dns"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Terraform VPN module
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform/vpn"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Terraform automation module
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform/automation"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions (when workflows are added)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
        exclude-patterns:
          - "github/gh-aw-actions/*"
    # gh-aw-actions SHAs are managed by the gh-aw compiler (lock files).
    # Dependabot must not bump them independently.
    ignore:
      - dependency-name: "github/gh-aw-actions/*"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Python dependencies for dataviewer
  - package-ecosystem: "uv"
    directory: "/data-management/viewer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dataviewer-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"
      - "dataviewer"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Python dependencies for dataviewer backend
  - package-ecosystem: "uv"
    directory: "/data-management/viewer/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dataviewer-backend-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"
      - "dataviewer"
    commit-message:
      prefix: "chore"
      include: "scope"

  # npm dependencies for dataviewer frontend
  - package-ecosystem: "npm"
    directory: "/data-management/viewer/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      dataviewer-frontend-patch-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "npm"
      - "dataviewer"
    commit-message:
      prefix: "chore"
      include: "scope"

  # npm dependencies for Docusaurus
  - package-ecosystem: "npm"
    directory: "/docs/docusaurus"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      docusaurus-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Go module dependencies for Terraform e2e tests
  - package-ecosystem: "gomod"
    directory: "/infrastructure/terraform/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "infrastructure"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Docker base image digests
  - package-ecosystem: "docker"
    directory: "/data-management/viewer/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/data-management/viewer/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/evaluation/sil/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"
