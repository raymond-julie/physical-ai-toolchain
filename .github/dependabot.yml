      - "*"
      update-types:
      - minor
      - patch
  open-pull-requests-limit: 5
  ignore:
  - dependency-name: "marshmallow"
    versions:
    - ">=4.0.0"
  - dependency-name: "torch"
    versions:
    - ">=2.11.0"
  - dependency-name: "numpy"
    versions:
    - ">=2.3.0"
  - dependency-name: "packaging"
    versions:
    - ">=26.0"
  labels:
  - dependencies
  - python
  - training
  commit-message:
    prefix: chore
    include: scope
