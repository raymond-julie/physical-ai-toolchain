- commit-message:
    include: scope
    prefix: chore
  directory: /
  # Agentic Workflows lock files are generated by `gh aw compile`; update the
  # source `.md` workflow instead of accepting direct Dependabot edits here.
  exclude-paths:
  - ".github/workflows/*.lock.yml"
  groups:
    github-actions:
      exclude-patterns:
      - github/gh-aw-actions/*
      patterns:
      - "*"
  ignore:
  - dependency-name: "github/gh-aw-actions/*"
  - dependency-name: "github/gh-aw-actions/**"
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - dependencies
  - github-actions
  open-pull-requests-limit: 5
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
