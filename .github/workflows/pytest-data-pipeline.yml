---
name: Pytest Data Pipeline

'on':
  workflow_call:
    inputs:
      code-coverage:
        description: 'Enable Codecov coverage upload'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  pytest-data-pipeline:
    name: Pytest Data Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: >-
          uv run pytest -o addopts="" data-pipeline/capture/tests -v
          --cov=data-pipeline/capture
          --cov-report=term-missing
          --cov-report=xml:logs/coverage-data-pipeline.xml
          --cov-fail-under=80

      - name: Upload coverage.xml artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pytest-data-pipeline-coverage-xml
          path: logs/coverage-data-pipeline.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: ${{ inputs.code-coverage && always() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: logs/coverage-data-pipeline.xml
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
          flags: pytest-data-pipeline
          name: pytest-data-pipeline-coverage
