---
name: Pytest Data Management Tools

'on':
  workflow_call:
    inputs:
      code-coverage:
        description: 'Enable Codecov coverage upload'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  pytest-dm-tools:
    name: Pytest Data Management Tools
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: >-
          uv run pytest -o addopts="" data-management/tools/tests -v
          --cov=data-management/tools
          --cov-report=term-missing
          --cov-report=xml:logs/coverage-dm-tools.xml
          --cov-fail-under=80

      - name: Upload coverage.xml artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pytest-dm-tools-coverage-xml
          path: logs/coverage-dm-tools.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: ${{ inputs.code-coverage && always() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: logs/coverage-dm-tools.xml
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
          flags: pytest-dm-tools
          name: pytest-dm-tools-coverage
