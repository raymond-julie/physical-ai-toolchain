name: Dependency Pinning Scan

on:
  workflow_call:
    inputs:
      threshold:
        description: 'Compliance threshold percentage (0-100)'
        required: false
        type: number
        default: 95
      dependency-types:
        description: 'Comma-separated list of dependency types to check'
        required: false
        type: string
        default: 'github-actions,npm,pip,shell-downloads,shell-inline-pip,gh-extension,powershell-modules,docker,workflow-npm-commands'
      soft-fail:
        description: 'Whether to continue on compliance violations'
        required: false
        type: boolean
        default: false
      upload-sarif:
        description: 'Whether to upload SARIF results to Security tab'
        required: false
        type: boolean
        default: false
      upload-artifact:
        description: 'Whether to upload results as artifact'
        required: false
        type: boolean
        default: true
      exclude-paths:
        description: 'Comma-separated glob patterns for paths to exclude from scanning'
        required: false
        type: string
        default: ''
    outputs:
      compliance-score:
        description: 'Compliance score percentage'
        value: ${{ jobs.scan.outputs.compliance-score }}
      unpinned-count:
        description: 'Number of unpinned dependencies found'
        value: ${{ jobs.scan.outputs.unpinned-count }}
      is-compliant:
        description: 'Whether repository meets compliance threshold'
        value: ${{ jobs.scan.outputs.is-compliant }}

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  scan:
    name: Validate SHA Pinning Compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload to Security tab
    outputs:
      compliance-score: ${{ steps.pinning.outputs.compliance-score }}
      unpinned-count: ${{ steps.pinning.outputs.unpinned-count }}
      is-compliant: ${{ steps.pinning.outputs.is-compliant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run SHA Pinning Validation
        id: pinning
        env:
          PINNING_THRESHOLD: ${{ inputs.threshold }}
          PINNING_DEPENDENCY_TYPES: ${{ inputs.dependency-types }}
          PINNING_SOFT_FAIL: ${{ inputs.soft-fail }}
          PINNING_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
          PINNING_EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
        run: ./scripts/security/Invoke-DependencyPinningWorkflow.ps1

      - name: Upload SARIF to Security tab
        if: inputs.upload-sarif && always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: logs/dependency-pinning-results.sarif
          category: dependency-pinning
        continue-on-error: true

      - name: Upload validation report
        if: inputs.upload-artifact && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-pinning-results
          path: logs/dependency-pinning-results.json
          retention-days: 90
