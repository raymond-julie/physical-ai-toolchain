name: Python Lint

on:
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on Python linting errors'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  ruff:
    name: Ruff Lint and Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0

      - name: Ruff lint check
        id: ruff-check
        continue-on-error: true
        run: |
          uvx ruff check . --output-format github 2>&1 | Tee-Object -FilePath ruff-check-results.txt
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            'RUFF_CHECK_FAILED=true' >> $env:GITHUB_ENV
          }
          exit $exitCode

      - name: Ruff format check
        id: ruff-format
        continue-on-error: true
        run: |
          uvx ruff format --check --diff . 2>&1 | Tee-Object -FilePath ruff-format-results.txt
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            'RUFF_FORMAT_FAILED=true' >> $env:GITHUB_ENV
          }
          exit $exitCode

      - name: HuggingFace revision-pin guard
        id: hf-pins
        continue-on-error: true
        run: |
          python3 scripts/security/check_hf_pins.py
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            'HF_PINS_FAILED=true' >> $env:GITHUB_ENV
          }
          exit $exitCode

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-lint-results
          path: |
            ruff-check-results.txt
            ruff-format-results.txt
          retention-days: 30

      - name: Fail job if errors found
        if: (env.RUFF_CHECK_FAILED == 'true' || env.RUFF_FORMAT_FAILED == 'true' || env.HF_PINS_FAILED == 'true') && !inputs.soft-fail
        run: |
          Write-Output "::error::Python lint violations detected. Run 'uvx ruff check --fix .', 'uvx ruff format .', and 'npm run lint:hfpins' locally."
          exit 1
