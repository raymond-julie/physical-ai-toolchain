name: Dataviewer Frontend Tests

on:
  workflow_call:
    inputs:
      code-coverage:
        description: 'Enable Codecov coverage upload'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Lint, Type-check, Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-management/viewer/frontend
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: data-management/viewer/frontend/.nvmrc
          cache: npm
          cache-dependency-path: data-management/viewer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Format check
        run: npm run format

      - name: Unit tests
        if: ${{ !inputs.code-coverage }}
        run: npm run test

      - name: Unit tests with coverage
        if: ${{ inputs.code-coverage }}
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: ${{ inputs.code-coverage && always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vitest-coverage-xml
          path: data-management/viewer/frontend/coverage/cobertura-coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: ${{ inputs.code-coverage && always() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage/cobertura-coverage.xml
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
          flags: vitest,vitest-components,vitest-features,vitest-lib,vitest-state,vitest-app
          name: vitest-coverage
