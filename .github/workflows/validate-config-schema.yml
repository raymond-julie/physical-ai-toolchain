name: Validate Config Schema

on:
  pull_request:
    paths:
      - 'data-pipeline/capture/models/config_models.py'
      - 'data-pipeline/capture/config/**'
  push:
    branches: [main]
    paths:
      - 'data-pipeline/capture/models/config_models.py'
      - 'data-pipeline/capture/config/**'

permissions:
  contents: read

jobs:
  validate-schema:
    name: Validate Config Schema Synchronization
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Install dependencies
        run: uv pip install --system "pydantic==2.12.5"

      - name: Regenerate schema
        run: python data-pipeline/capture/config/generate_config_schema.py

      - name: Check for schema drift
        run: |
          if ! git diff --exit-code data-pipeline/capture/config/recording_config.schema.json; then
            echo ""
            echo "❌ Error: Schema is out of sync with pydantic models"
            echo ""
            echo "The JSON Schema file does not match the current pydantic models."
            echo "If the models have changed intentionally, regenerate the schema by running the following command locally:"
            echo ""
            echo "  uv pip install 'pydantic==2.12.5' && python data-pipeline/capture/config/generate_config_schema.py"
            echo ""
            echo "Then commit the updated schema file."
            echo ""
            exit 1
          fi
          echo "✅ Config schema is up-to-date with pydantic models"
