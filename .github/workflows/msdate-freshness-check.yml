name: ms.date Freshness Check

on:
  workflow_call:
    inputs:
      staleness-threshold-days:
        description: 'Number of days before ms.date is considered stale'
        required: false
        type: number
        default: 90
      changed-files-only:
        description: 'Only check changed markdown files'
        required: false
        type: boolean
        default: false
      soft-fail:
        description: 'Prevent PR failures when ms.date issues are detected'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  msdate-freshness:
    name: Check ms.date Freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Create logs directory
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null

      - name: Install PowerShell-Yaml
        run: |
          Install-Module -Name PowerShell-Yaml -Force -Scope CurrentUser

      - name: Run ms.date Freshness Check
        env:
          THRESHOLD_DAYS: ${{ inputs.staleness-threshold-days }}
          CHANGED_FILES_ONLY: ${{ inputs.changed-files-only }}
        run: |
          $params = @{
            ThresholdDays = [int]$env:THRESHOLD_DAYS
          }
          if ($env:CHANGED_FILES_ONLY -eq 'true') {
            $params['ChangedFilesOnly'] = $true
          }
          & scripts/linting/Invoke-MsDateFreshnessCheck.ps1 @params
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload freshness check results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msdate-freshness-results
          path: logs/msdate-freshness-results.json
          retention-days: 30

      - name: Upload job summary
        if: always()
        run: |
          if (Test-Path logs/msdate-summary.md) {
            Get-Content logs/msdate-summary.md >> $env:GITHUB_STEP_SUMMARY
          }
