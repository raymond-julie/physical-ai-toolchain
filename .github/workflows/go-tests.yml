name: Go Tests

on:
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on Go test failures'
        required: false
        type: boolean
        default: false
      changed-files-only:
        description: 'Only test when Go files changed'
        required: false
        type: boolean
        default: false
      code-coverage:
        description: 'Whether to upload coverage to Codecov'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: ${{ inputs.changed-files-only && '0' || '1' }}

      - name: Create logs directory
        run: New-Item -ItemType Directory -Force -Path logs | Out-Null

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: infrastructure/terraform/e2e/go.mod
          cache-dependency-path: infrastructure/terraform/e2e/go.sum

      - name: Install terraform-docs
        run: |
          $version = 'v0.21.0'
          $expectedSha = '2fdd81b8d21ff1498cd559af0dcc5d155835f84600db06d3923e217124fc735a'
          $tarball = 'terraform-docs.tar.gz'
          $url = "https://github.com/terraform-docs/terraform-docs/releases/download/${version}/terraform-docs-${version}-linux-amd64.tar.gz"

          Invoke-WebRequest -Uri $url -OutFile $tarball

          $actualSha = (Get-FileHash -Path $tarball -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha -ne $expectedSha) {
            throw "SHA256 mismatch for terraform-docs ${version}: expected '${expectedSha}', got '${actualSha}'"
          }
          Write-Output "SHA256 verified: ${actualSha}"

          tar -xzf $tarball
          sudo mv terraform-docs /usr/local/bin/
          terraform-docs --version

      - name: Run Go tests
        id: go-tests
        continue-on-error: ${{ inputs.soft-fail }}
        run: |
          $params = @{}
          if ('${{ inputs.changed-files-only }}' -eq 'true') {
            $params['ChangedFilesOnly'] = $true
          }
          ./scripts/linting/Invoke-GoTest.ps1 @params

      - name: Upload Go test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-test-results
          path: |
            logs/go-test-results.json
            logs/go-coverage.out
          if-no-files-found: ignore

      - name: Upload to Codecov
        if: inputs.code-coverage && always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: logs/go-coverage.out
          flags: go
          fail_ci_if_error: false
