name: Weekly Validation

on:
  schedule:
    # Weekly scan: Mondays at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: stale-docs-issues
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

defaults:
  run:
    shell: pwsh

jobs:
  # ms.date freshness validation - hard-fail mode for notification
  msdate-freshness:
    name: ms.date Freshness Check
    uses: ./.github/workflows/msdate-freshness-check.yml
    with:
      staleness-threshold-days: 90
      changed-files-only: false  # Check all files
      soft-fail: false
    permissions:
      contents: read

  # Container base-image CVE rescan (Trivy, soft-fail). Re-evaluates already-merged
  # base images and surfaces newly-disclosed CVEs to the Security tab without
  # failing the run; the PR gate only sees images at merge time.
  container-rescan:
    name: Container Rescan
    uses: ./.github/workflows/container-scan.yml
    with:
      soft-fail: true
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload to Security tab

  create-stale-docs-issues:
    name: Create or Update Issues for Stale Documentation
    needs: [msdate-freshness]
    if: failure() && needs.msdate-freshness.result == 'failure'
    uses: ./.github/workflows/create-stale-docs-issues.yml
    with:
      threshold-days: 90
      artifact-name: msdate-freshness-results
    permissions:
      contents: read
      issues: write
