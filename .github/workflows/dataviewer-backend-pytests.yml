name: Dataviewer Backend Pytest

on:
  workflow_call:
    inputs:
      code-coverage:
        description: 'Enable Codecov coverage upload'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  pytest-dataviewer:
    name: Pytest Dataviewer Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-management/viewer/backend
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: uv sync --extra dev --extra analysis --extra hdf5 --extra export --extra auth

      - name: Run pytest with coverage
        run: uv run pytest -v --cov=src --cov-report=xml:../../../logs/coverage-dataviewer.xml --cov-report=term-missing --cov-fail-under=90

      - name: Upload coverage.xml artifact
        if: ${{ inputs.code-coverage && always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-dataviewer-coverage-xml
          path: logs/coverage-dataviewer.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: ${{ inputs.code-coverage && always() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: logs/coverage-dataviewer.xml
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
          flags: pytest-dataviewer
          name: pytest-dataviewer-coverage
