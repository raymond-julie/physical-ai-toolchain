name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  # Spell checking using cspell
  spell-check:
    name: Spell Check
    uses: ./.github/workflows/spell-check.yml
    permissions:
      contents: read

  # Markdown linting using markdownlint-cli2
  markdown-lint:
    name: Markdown Lint
    uses: ./.github/workflows/markdown-lint.yml
    permissions:
      contents: read

  # Markdown table formatting check
  table-format:
    name: Table Format
    uses: ./.github/workflows/table-format.yml
    permissions:
      contents: read

  # Frontmatter validation for markdown files
  frontmatter-validation:
    name: Frontmatter Validation
    uses: ./.github/workflows/frontmatter-validation.yml
    with:
      changed-files-only: false
    permissions:
      contents: read

  # PowerShell script analysis
  psscriptanalyzer:
    name: PSScriptAnalyzer
    uses: ./.github/workflows/ps-script-analyzer.yml
    with:
      changed-files-only: false
    permissions:
      contents: read

  # YAML/actionlint workflow linting
  yaml-lint:
    name: YAML Lint
    uses: ./.github/workflows/yaml-lint.yml
    with:
      changed-files-only: false
    permissions:
      contents: read

  # Link language locale check
  link-lang-check:
    name: Link Language Check
    uses: ./.github/workflows/link-lang-check.yml
    permissions:
      contents: read

  # Markdown link validation
  markdown-link-check:
    name: Markdown Link Check
    uses: ./.github/workflows/markdown-link-check.yml
    permissions:
      contents: read

  # SHA pinning compliance for GitHub Actions and dependencies
  dependency-pinning:
    name: Dependency Pinning
    uses: ./.github/workflows/dependency-pinning-scan.yml
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload to Security tab
    with:
      upload-sarif: true
      exclude-paths: 'scripts/tests/Fixtures/**,shared/ci/tests/Fixtures/**'

  # PowerShell Pester test execution
  pester-tests:
    name: Pester Tests
    uses: ./.github/workflows/pester-tests.yml
    with:
      changed-files-only: false
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Pytest: training component
  pytest-training:
    name: Pytest Training
    uses: ./.github/workflows/pytest-training.yml
    with:
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Pytest: data-management/tools component
  pytest-dm-tools:
    name: Pytest DM Tools
    uses: ./.github/workflows/pytest-dm-tools.yml
    with:
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Pytest: data-pipeline component
  pytest-data-pipeline:
    name: Pytest Data Pipeline
    uses: ./.github/workflows/pytest-data-pipeline.yml
    with:
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Pytest: inference component
  pytest-inference:
    name: Pytest Inference
    uses: ./.github/workflows/pytest-inference.yml
    with:
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Dataviewer frontend lint, type-check, and build
  dataviewer-frontend-tests:
    name: Dataviewer Frontend Tests
    uses: ./.github/workflows/dataviewer-frontend-tests.yml
    with:
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Dataviewer backend pytest execution
  dataviewer-backend-pytests:
    name: Dataviewer Backend Pytest
    uses: ./.github/workflows/dataviewer-backend-pytests.yml
    with:
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Evaluation domain pytest execution
  evaluation-pytests:
    name: Evaluation Pytest
    uses: ./.github/workflows/evaluation-pytests.yml
    with:
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Fuzz regression via deterministic corpus-based tests
  fuzz-regression-tests:
    name: Fuzz Regression Tests
    uses: ./.github/workflows/fuzz-regression-tests.yml
    with:
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Python linting using ruff
  python-lint:
    name: Python Lint
    uses: ./.github/workflows/python-lint.yml
    permissions:
      contents: read

  # Terraform linting using TFLint
  terraform-lint:
    name: Terraform Lint
    uses: ./.github/workflows/terraform-lint.yml
    with:
      soft-fail: false
    permissions:
      contents: read

  # Terraform format and validate checks
  terraform-validation:
    name: Terraform Validation
    uses: ./.github/workflows/terraform-validation.yml
    with:
      soft-fail: false
    permissions:
      contents: read

  # Terraform test execution with Codecov Test Analytics
  terraform-tests:
    name: Terraform Tests
    uses: ./.github/workflows/terraform-tests.yml
    with:
      soft-fail: true
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # Go linting using golangci-lint
  go-lint:
    name: Go Lint
    uses: ./.github/workflows/go-lint.yml
    with:
      soft-fail: false
    permissions:
      contents: read

  # Go tests
  go-tests:
    name: Go Tests
    uses: ./.github/workflows/go-tests.yml
    with:
      soft-fail: true
      code-coverage: true
    permissions:
      contents: read
      id-token: write

  # ShellCheck linting for shell scripts
  shellcheck:
    name: ShellCheck
    uses: ./.github/workflows/shellcheck.yml
    with:
      soft-fail: false
    permissions:
      contents: read

  # Terraform documentation freshness check
  terraform-docs-check:
    name: Terraform Docs Check
    uses: ./.github/workflows/terraform-docs-check.yml
    with:
      soft-fail: true
    permissions:
      contents: read
  # CodeQL security analysis
  codeql-analysis:
    name: CodeQL Analysis
    uses: ./.github/workflows/codeql-analysis.yml
    permissions:
      contents: read
      security-events: write
      actions: read

  # Automated release PR management via release-please
  release-please:
    needs:
      - spell-check
      - markdown-lint
      - table-format
      - frontmatter-validation
      - psscriptanalyzer
      - yaml-lint
      - link-lang-check
      - markdown-link-check
      - dependency-pinning
      - pester-tests
      - pytest-training
      - pytest-dm-tools
      - pytest-data-pipeline
      - pytest-inference
      - dataviewer-frontend-tests
      - dataviewer-backend-pytests
      - evaluation-pytests
      - python-lint
      - terraform-lint
      - terraform-validation
      - terraform-tests
      - go-lint
      - go-tests
      - shellcheck
      - terraform-docs-check
      - codeql-analysis
    name: Release Please
    runs-on: ubuntu-latest
    concurrency:
      group: release-please-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json
          # On release commits, skip PR creation to prevent bogus PRs
          # from draft release lazy tag timing. Release commits have zero
          # unreleased changes so skipping loses nothing. The tag is
          # created in the next step, ensuring subsequent runs find it.
          skip-github-pull-request: ${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(main)') }}

      - name: Checkout release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup uv
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Regenerate uv.lock
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          uv lock
          if git diff --quiet -- uv.lock; then
            echo "uv.lock is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add uv.lock
          git commit -m "chore: regenerate uv.lock"
          git push

      - name: Stamp ms.date in CHANGELOG.md
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          $today = [datetime]::UtcNow.ToString('yyyy-MM-dd')
          $path = 'CHANGELOG.md'
          $content = Get-Content -Raw -LiteralPath $path
          $updated = [regex]::Replace($content, '(?m)^ms\.date:\s.*$', "ms.date: $today")
          if ($updated -ceq $content) {
            Write-Host "CHANGELOG.md ms.date already set to $today"
            exit 0
          }
          Set-Content -LiteralPath $path -Value $updated -NoNewline -Encoding utf8NoBOM
          & git config user.name 'github-actions[bot]'
          & git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          & git remote set-url origin "https://x-access-token:$env:GH_TOKEN@github.com/$env:GITHUB_REPOSITORY.git"
          & git add $path
          & git commit -m 'chore: stamp ms.date in CHANGELOG.md'
          & git push

      - name: Checkout default branch for tag signing
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install gitsign
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          $version = 'v0.13.0'
          $arch = '${{ runner.arch }}'

          switch ($arch) {
            'X64' {
              $asset = 'gitsign_0.13.0_linux_amd64'
              $expectedSha = '011af11d57ad205b4ae4e3f41ecc8c64fbe0043c829190c0cb44fce6fce74bbb'
            }
            'ARM64' {
              $asset = 'gitsign_0.13.0_linux_arm64'
              $expectedSha = 'f0ec4732696b88f133ab6ef9ac2fe8be843ab9540bd1cc51dc4143142a858372'
            }
            default {
              throw "Unsupported runner architecture: $arch"
            }
          }

          $assetUrl = "https://github.com/sigstore/gitsign/releases/download/$version/$asset"
          $assetPath = Join-Path $env:RUNNER_TEMP $asset
          Invoke-WebRequest -Uri $assetUrl -OutFile $assetPath

          $actualSha = (Get-FileHash -Path $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha -ne $expectedSha) {
            throw "Checksum verification failed for $asset. Expected $expectedSha but got $actualSha"
          }

          $binDir = Join-Path $env:RUNNER_TEMP 'bin'
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          $gitsign = Join-Path $binDir 'gitsign'
          Move-Item -Path $assetPath -Destination $gitsign -Force
          chmod +x $gitsign
          Add-Content -Path $env:GITHUB_PATH -Value $binDir
          & $gitsign version

      # Workaround: release-please with "draft": true uses lazy tag
      # creation. The git tag is not materialized until the release is
      # published. Without the tag, release-please cannot find the draft
      # on subsequent runs, breaking version anchoring and causing bogus
      # changelog entries. The skip-github-pull-request conditional above
      # prevents PR creation on release commits (zero unreleased changes),
      # and this step creates a signed tag so subsequent runs find the release.
      # Replace both workarounds with "force-tag-creation": true in
      # release-please-config.json once release-please-action ships a
      # version that includes googleapis/release-please#2627.
      - name: Create signed git tag for draft release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global gpg.format x509
          git config --global gpg.x509.program gitsign
          git config --global tag.gpgSign true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --tags --force

          $tag = '${{ steps.release.outputs.tag_name }}'
          $existingTag = git tag --list $tag
          if ($existingTag) {
            Write-Output "Git tag $tag already exists"
            exit 0
          }

          git remote set-url origin "https://x-access-token:${env:GH_TOKEN}@github.com/${env:GITHUB_REPOSITORY}.git"
          git tag -s $tag $env:GITHUB_SHA -m "Release $tag"
          git push origin "refs/tags/$tag"
          Write-Output "Created signed git tag $tag -> $env:GITHUB_SHA"

      - name: Verify signed git tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          $tag = '${{ steps.release.outputs.tag_name }}'
          git tag -v $tag

  # Generate dependency SBOM from all package manifests
  generate-dependency-sbom:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: [release-please]
    name: Generate Dependency SBOM
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout dependency manifests
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            .syft.yaml
            package.json
            package-lock.json
            pyproject.toml
            uv.lock
            evaluation/pyproject.toml
            evaluation/uv.lock
            training/rl/pyproject.toml
            training/il/lerobot/pyproject.toml
            data-management/viewer/pyproject.toml
            data-management/viewer/package.json
            data-management/viewer/backend/pyproject.toml
            data-management/viewer/backend/uv.lock
            data-management/viewer/frontend/package.json
            data-management/viewer/frontend/package-lock.json
            docs/docusaurus/package.json
            docs/docusaurus/package-lock.json
            infrastructure/terraform/e2e/go.mod

      - name: Generate dependency SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: spdx-json
          config: .syft.yaml
          output-file: dependencies.spdx.json
          artifact-name: ''
          dependency-snapshot: true

      - name: Upload dependency SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-dependencies
          path: dependencies.spdx.json

      - name: Upload dependency SBOM to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "${TAG}" \
            dependencies.spdx.json \
            --clobber
        shell: bash

  # Sign release artifacts and generate SBOM attestation
  attest-release:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: [release-please, generate-dependency-sbom]
    name: Attest Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download dependency SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-dependencies

      - name: Create source archive
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: git archive --format=tar.gz --prefix="${TAG}/" HEAD -o "source-${TAG}.tar.gz"
        shell: bash

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: ''

      - name: Attest build provenance
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-path: "source-${{ needs.release-please.outputs.tag_name }}.tar.gz"

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-path: "source-${{ needs.release-please.outputs.tag_name }}.tar.gz"
          sbom-path: sbom.spdx.json

      - name: Attest dependency SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-path: "source-${{ needs.release-please.outputs.tag_name }}.tar.gz"
          sbom-path: dependencies.spdx.json

      - name: Create signing artifacts for Scorecard detection
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cp "${BUNDLE_PATH}" "source-${TAG}.sigstore.json"
          jq -c '.dsseEnvelope' "${BUNDLE_PATH}" > "source-${TAG}.intoto.jsonl"
        shell: bash

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "${TAG}" \
            "source-${TAG}.tar.gz" \
            sbom.spdx.json \
            "source-${TAG}.sigstore.json" \
            "source-${TAG}.intoto.jsonl" \
            --clobber
        shell: bash

  # Compare dependency SBOM against previous release
  sbom-diff:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: [release-please, generate-dependency-sbom]
    name: SBOM Diff
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Download current dependency SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-dependencies

      - name: Download previous release SBOM
        id: prev-sbom
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          prev_tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 10 --json tagName,isDraft --jq '[.[] | select(.tagName != env.TAG and .isDraft == false)] | first | .tagName // empty')
          if [ -z "$prev_tag" ]; then
            echo "No previous release found"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Previous release: $prev_tag"
          gh release download "$prev_tag" --repo "$GITHUB_REPOSITORY" --pattern "dependencies.spdx.json" --dir previous || {
            echo "No dependency SBOM in previous release $prev_tag"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          echo "found=true" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate dependency diff
        if: steps.prev-sbom.outputs.found == 'true'
        run: |
          python3 - <<'DIFF_SCRIPT'
          import json, pathlib

          def load_packages(path):
              doc = json.loads(pathlib.Path(path).read_text())
              pkgs = {}
              for p in doc.get("packages", []):
                  name = p.get("name", "UNKNOWN")
                  version = p.get("versionInfo", "unknown")
                  pkgs[name] = version
              return pkgs

          current = load_packages("dependencies.spdx.json")
          previous = load_packages("previous/dependencies.spdx.json")
          all_names = sorted(set(current) | set(previous))

          added, removed, changed = [], [], []
          for name in all_names:
              cur_ver = current.get(name)
              prev_ver = previous.get(name)
              if cur_ver and not prev_ver:
                  added.append(f"| {name} | {cur_ver} |")
              elif prev_ver and not cur_ver:
                  removed.append(f"| {name} | {prev_ver} |")
              elif cur_ver != prev_ver:
                  changed.append(f"| {name} | {prev_ver} | {cur_ver} |")

          lines = ["# Dependency Diff\n"]
          if added:
              lines += ["\n## Added\n", "| Package | Version |", "| --- | --- |"] + added
          if removed:
              lines += ["\n## Removed\n", "| Package | Version |", "| --- | --- |"] + removed
          if changed:
              lines += ["\n## Changed\n", "| Package | Previous | Current |", "| --- | --- | --- |"] + changed
          if not (added or removed or changed):
              lines.append("\nNo dependency changes detected.")

          pathlib.Path("dependency-diff.md").write_text("\n".join(lines) + "\n")
          print(f"Diff: {len(added)} added, {len(removed)} removed, {len(changed)} changed")
          DIFF_SCRIPT
        shell: bash

      - name: Upload dependency diff to release
        if: steps.prev-sbom.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "${TAG}" \
            dependency-diff.md \
            --clobber
        shell: bash

  # Append attestation verification instructions to release notes
  append-verification-notes:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: [release-please, attest-release]
    name: Append Verification Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Append verification instructions
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          body=$(gh release view "${TAG}" --repo "$GITHUB_REPOSITORY" --json body --jq '.body')

          verification=$(cat <<'EOF'

          ---

          ## Artifact Verification

          All release artifacts include [Sigstore](https://www.sigstore.dev/) provenance attestations. Verify with the [GitHub CLI](https://cli.github.com/):

          ```bash
          # Download the source archive
          gh release download TAG_PLACEHOLDER --repo microsoft/physical-ai-toolchain --pattern 'source-TAG_PLACEHOLDER.tar.gz'

          # Verify build provenance
          gh attestation verify source-TAG_PLACEHOLDER.tar.gz --repo microsoft/physical-ai-toolchain

          # Verify SBOM attestation
          gh attestation verify source-TAG_PLACEHOLDER.tar.gz --repo microsoft/physical-ai-toolchain --predicate-type https://spdx.dev/Document
          ```

          EOF
          )

          verification="${verification//TAG_PLACEHOLDER/${TAG}}"
          printf '%s\n%s\n' "$body" "$verification" > notes.md
          gh release edit "${TAG}" --repo "$GITHUB_REPOSITORY" --notes-file notes.md
        shell: bash

  # Promote draft release to published
  publish-release:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: [release-please, attest-release, sbom-diff, append-verification-notes]
    name: Publish Release
    runs-on: ubuntu-latest
    concurrency:
      group: release-please-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit $env:TAG_NAME --draft=false --repo $env:GITHUB_REPOSITORY

      - name: Close released milestone
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          $milestones = gh api --paginate "repos/$env:GITHUB_REPOSITORY/milestones?per_page=100&state=all" --jq '.[]' 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Output '::warning::API call failed while querying milestones for ${{ needs.release-please.outputs.tag_name }}'
            exit 0
          }

          $match = @($milestones | ConvertFrom-Json) | Where-Object { $_.title -eq $env:TAG_NAME }
          if (-not $match) {
            Write-Output "::warning::No milestone found matching $env:TAG_NAME"
            exit 0
          }

          $msNumber = $match.number
          $msState = $match.state

          if ($msState -eq 'closed') {
            Write-Output "Milestone $env:TAG_NAME (#$msNumber) already closed"
            exit 0
          }

          $detail = gh api "repos/$env:GITHUB_REPOSITORY/milestones/$msNumber" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning::API call failed while querying milestone details for $env:TAG_NAME (#$msNumber)"
            exit 0
          }
          $openIssues = ($detail | ConvertFrom-Json).open_issues

          if ($openIssues -gt 0) {
            Write-Output "::warning::Milestone $env:TAG_NAME has $openIssues open issue(s) — triage after closure"
          }

          $null = gh api "repos/$env:GITHUB_REPOSITORY/milestones/$msNumber" --method PATCH -f state=closed 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning::Failed to close milestone $env:TAG_NAME (#$msNumber)"
            exit 0
          }

          Write-Output "Closed milestone $env:TAG_NAME (#$msNumber)"
