name: Terraform Lint

on:
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on TFLint violations'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Create logs directory
        run: New-Item -ItemType Directory -Force -Path logs | Out-Null

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.61.0
          cache: true

      - name: Init TFLint
        run: tflint --init --config (Resolve-Path .tflint.hcl) --recursive
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        continue-on-error: ${{ inputs.soft-fail }}
        run: scripts/linting/Invoke-TFLint.ps1

      - name: Upload TFLint results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tflint-results
          path: logs/tflint-results.json
          retention-days: 30
