workflow:
  name: isaaclab-inference
  timeout:
    exec_timeout: 2h
  resources:
    default:
      gpu: 1
      cpu: 20
      memory: 180Gi
      storage: 100Gi
      platform: gpu_platform
  tasks:
    - name: isaac-inference
      image: "{{ image }}"
      command:
        - /bin/bash
        - /tmp/entry.sh
      inputs:
        - url: "{{ code_url }}"
          regex: ".*"
      environment:
        NVIDIA_DRIVER_CAPABILITIES: "all"
        TASK: "{{ task }}"
        NUM_ENVS: "{{ num_envs }}"
        MAX_STEPS: "{{ max_steps }}"
        VIDEO_LENGTH: "{{ video_length }}"
        ACCEPT_EULA: "Y"
        PRIVACY_CONSENT: "Y"
        PAYLOAD_ROOT: "{{ payload_root }}"
        CHECKPOINT_URI: "{{ checkpoint_uri }}"
        INFERENCE_FORMAT: "{{ inference_format }}"
        AZURE_SUBSCRIPTION_ID: "{{ azure_subscription_id }}"
        AZURE_RESOURCE_GROUP: "{{ azure_resource_group }}"
        AZUREML_WORKSPACE_NAME: "{{ azure_workspace_name }}"
        AZURE_STORAGE_ACCOUNT_NAME: "{{ azure_storage_account_name }}"
        AZURE_STORAGE_CONTAINER_NAME: "{{ azure_storage_container_name }}"
        AZURE_AUTHORITY_HOST: "{{ azure_authority_host }}"
        PYTHON: "{{ python }}"
      files:
        - path: /tmp/entry.sh
          contents: |
            #!/bin/bash
            set -euo pipefail

            if [[ -z "${CHECKPOINT_URI:-}" ]]; then
              echo "checkpoint_uri is required" >&2
              exit 1
            fi

            PAYLOAD_ROOT="${PAYLOAD_ROOT:-/workspace/isaac_payload}"
            INFERENCE_ROOT="${INFERENCE_ROOT:-${PAYLOAD_ROOT}/evaluation/sil}"

            mkdir -p "${PAYLOAD_ROOT}"
            # Code is delivered via the OSMO url: input (object storage), not an
            # env var: a single env string is capped at 128 KiB (MAX_ARG_STRLEN)
            # and the archive exceeds that, failing the container execve E2BIG.
            ARCHIVE_PATH="$(find "{{input:0}}" -maxdepth 2 -name '*.zip' | head -n1)"
            if [[ -z "${ARCHIVE_PATH}" || ! -s "${ARCHIVE_PATH}" ]]; then
              echo "ERROR: no code archive found under the input mount; runtime payload is required." >&2
              ls -laR "{{input:0}}" || true
              exit 1
            fi
            unzip -oq "${ARCHIVE_PATH}" -d "${PAYLOAD_ROOT}"

            infer_args=(
              --task "${TASK:-}"
              --num-envs "${NUM_ENVS:-4}"
              --max-steps "${MAX_STEPS:-500}"
              --video-length "${VIDEO_LENGTH:-200}"
              --inference-format "${INFERENCE_FORMAT:-both}"
              --checkpoint-uri "${CHECKPOINT_URI:-}"
              --headless
            )

            bash "${INFERENCE_ROOT}/infer.sh" "${infer_args[@]}"

default-values:
  # Submission scripts set image from scripts/lib/common.sh via --set-string.
  # This value is the direct-workflow fallback; keep it in sync with DEFAULT_ISAAC_LAB_IMAGE.
  image: nvcr.io/nvidia/isaac-lab:2.3.2@sha256:388dbc806f48359a964cb9f807feb226da95d0a107f470fdcad9780ea10fe6f2
  task: Isaac-Ant-v0
  num_envs: "4"
  max_steps: "500"
  video_length: "200"
  code_url: ""
  payload_root: /workspace/isaac_payload
  checkpoint_uri: ""
  inference_format: "both"
  azure_subscription_id: ""
  azure_resource_group: ""
  azure_workspace_name: ""
  azure_storage_account_name: ""
  azure_storage_container_name: "isaaclab-training-logs"
  azure_authority_host: https://login.microsoftonline.com
  python: "/workspace/isaaclab/isaaclab.sh -p"
