# Isaac Lab Evaluation Job Template
#
# This is a STRUCTURAL TEMPLATE used by submit-azureml-isaaclab-evaluation.sh.
# Values below are defaults and may be overridden at submission time.
#
# The submission script is responsible for:
# - Setting trained_model input (Azure ML model URI)
# - Fetching task/framework/threshold from Azure ML model tags
# - Setting evaluation parameters via --set inputs.*
#
# Model metadata flow:
# 1. Training registers model with tags: {task, framework, algorithm, evaluated}
# 2. Training registers model with properties: {success_threshold}
# 3. Submission script fetches tags/properties via `az ml model show`
# 4. Values are passed to job via inputs (task, framework, success_threshold)
# 5. policy_evaluation.py reads values from CLI args (not files)
#
# This file defines:
# - The job structure and schema
# - Input specifications with defaults
# - Environment variable mappings
# - Identity configuration
#
# To submit an evaluation job, use submit-azureml-isaaclab-evaluation.sh with appropriate flags.

$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: Isaac Lab Policy Evaluation
description: Evaluate any trained Isaac Lab policy with automatic task/framework detection.
experiment_name: isaaclab-evaluation
identity:
  type: managed_identity

# All values below are placeholders and will be overridden by submit-azureml-isaaclab-evaluation.sh
# This file serves as a structural template for the job definition.
code: .
environment: azureml:isaaclab-training-env:latest
compute: azureml:cpu-cluster

# Inputs follow the same pattern as isaaclab-train.yaml
# - Model inputs use type/path/mode structure
# - Literal inputs are simple key-value pairs (no type declaration)
inputs:
  # Model input - will be overridden with actual model path
  # Using download mode instead of ro_mount to avoid workload identity issues
  trained_model:
    type: custom_model
    path: azureml:placeholder:1
    mode: download
  # Literal inputs - these are defaults, overridden by --set flags
  # Note: Empty strings are not allowed, use "auto" or "none" as sentinel values
  task: auto
  framework: auto
  eval_episodes: 100
  num_envs: 64
  success_threshold: -1.0

command: echo "Command will be set by submission script"

environment_variables:
  PYTHON: /workspace/isaaclab/isaaclab.sh -p
  ACCEPT_EULA: "Y"
  PRIVACY_CONSENT: "Y"

resources:
  instance_type: gpuspot
