# LeRobot Evaluate Component (Pipeline)
#
# Wraps evaluation/sil/scripts/run_evaluation.py as an AzureML CommandComponent
# for use inside lerobot-pipeline.yaml. Emits the existing eval_results.json
# alongside the evaluation_schema_version=1 pair (metrics.json +
# failure_cases.jsonl) so the pipeline output is HITL-feedback ready.
#
# Code root is the repository root so the script's relative path
# (evaluation/sil/scripts/run_evaluation.py) resolves cleanly without the
# broken `cp -r scripts /tmp/scripts` pattern used by the legacy CommandJob.
#
# Compute and environment_variables (POLICY_REPO_ID, POLICY_TYPE,
# DATASET_REPO_ID, EVAL_EPISODES, OUTPUT_DIR, JOB_NAME, MLFLOW_ENABLE) are
# set at the parent pipeline job step.

$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command
name: lerobot_evaluate
display_name: LeRobot Evaluate
version: "1"
description: >-
  Run LeRobot imitation learning evaluation (ACT / Diffusion / pi0). Emits
  per-episode metrics, trajectory plots, eval_results.json (legacy),
  metrics.json + failure_cases.jsonl (VLA evaluation_schema_version=1).

code: ../../../../..

inputs:
  model_checkpoint:
    type: uri_folder
    description: Trained checkpoint folder from the train step or a registered model URI.
  prepared_dataset:
    type: uri_folder
    optional: true
    description: Dataset prepared by the preprocess step (or mounted directly).
  dataset_repo_id:
    type: string
    description: HuggingFace-style dataset repo id (set as DATASET_REPO_ID at the step level).
  policy_type:
    type: string
    default: act
    description: Policy type forwarded to the evaluator (act / diffusion / pi0).
  job_name:
    type: string
    description: Pipeline job display name (used for MLflow run naming).

outputs:
  eval_metrics:
    type: uri_folder
    mode: upload
    description: >-
      Evaluation outputs: eval_results.json (legacy aggregate), metrics.json
      (VLA schema v1 aggregate verdict), failure_cases.jsonl (VLA schema v1
      per-episode failure records), plus trajectory plots.

environment:
  # Digest-pinned base image; keep in sync with DEFAULT_LEROBOT_EVAL_IMAGE in
  # scripts/lib/common.sh (both refreshed by scripts/update-image-digests.sh).
  # An inline image yields an anonymous, content-hashed environment, so a base
  # image change never collides with an immutable registered environment version.
  image: pytorch/pytorch:2.4.1-cuda12.4-cudnn9-runtime@sha256:0a3b9fedefe1f61ac4d5a9de9015c0863db27ca0fde2d4e37e6268147980b726

# Bridge pipeline-mounted inputs/output into the env-var ABI run_evaluation.py
# expects:
#   model_checkpoint    -> POLICY_REPO_ID (local checkpoint dir; from_pretrained
#                          accepts a local path identically to a HF repo id)
#   prepared_dataset    -> DATASET_DIR (optional; if unset, falls back to
#                          DATASET_REPO_ID HF download path). preprocess.py
#                          writes the dataset to "{output}/{repo_id}/", so the
#                          bridge appends DATASET_REPO_ID to land at the
#                          directory containing meta/info.json.
#   outputs.eval_metrics -> OUTPUT_DIR (where metrics.json + failure_cases.jsonl
#                          + eval_results.json + plots are written)
command: >-
  bash -c '
  set -euo pipefail;
  source training/il/scripts/lerobot/lerobot-azureml.sh;
  ensure_lerobot_runtime "${LEROBOT_VENV:-/opt/lerobot-venv}" training/il/lerobot av pyarrow lerobot;
  export POLICY_REPO_ID="$AZURE_ML_INPUT_model_checkpoint";
  if [[ ! -f "$POLICY_REPO_ID/config.json" ]]; then
    checkpoint_config="";
    for candidate in "$POLICY_REPO_ID/checkpoints/last/pretrained_model" "$POLICY_REPO_ID/last/pretrained_model"; do
      if [[ -f "$candidate/config.json" ]]; then
        checkpoint_config="$candidate/config.json";
        break;
      fi;
    done;
    if [[ -z "$checkpoint_config" ]]; then
      checkpoint_config="$(find "$POLICY_REPO_ID" -maxdepth 4 -type f -name config.json | sort | tail -n 1 || true)";
    fi;
    if [[ -n "$checkpoint_config" ]]; then
      export POLICY_REPO_ID="$(dirname "$checkpoint_config")";
    fi;
  fi;
  if [[ -n "${AZURE_ML_INPUT_prepared_dataset:-}" ]]; then
    require_relative_dataset_repo_id;
    export DATASET_DIR="$AZURE_ML_INPUT_prepared_dataset/$DATASET_REPO_ID";
    echo "[BRIDGE] DATASET_DIR=$DATASET_DIR";
  fi;
  export OUTPUT_DIR="$AZURE_ML_OUTPUT_eval_metrics";
  echo "[BRIDGE] POLICY_REPO_ID=$POLICY_REPO_ID";
  echo "[BRIDGE] OUTPUT_DIR=$OUTPUT_DIR";
  python evaluation/sil/scripts/run_evaluation.py'
