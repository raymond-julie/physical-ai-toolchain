# Global configuration shared across all OSMO services
global:
  osmoImageLocation: nvcr.io/nvidia/osmo
  osmoImageTag: 6.3.0
  serviceAccountName: osmo-control-plane

  logs:
    enabled: true
    logLevel: DEBUG
    k8sLogLevel: WARNING

# Individual service configurations
services:
  # Configuration file service settings
  configFile:
    enabled: true

  # Admin user bootstrapped at startup (Tier 2 auth)
  # Password stored in K8s secret; doubles as access token for CLI login.
  # To enable IdP (Tier 3), keep defaultAdmin for bootstrapping alongside sidecar config below.
  defaultAdmin:
    enabled: true
    username: "admin"
    passwordSecretName: osmo-default-admin
    passwordSecretKey: password

  # PostgreSQL database configuration
  postgres:
    enabled: false  # Set to false if using external PostgreSQL

    # Settings still in use internal to osmo
    serviceName: "<replace-me>.postgres.database.azure.com"
    db: "osmo"
    user: "pgadmin"

  # Redis cache configuration
  # Azure Managed Redis provides Redis 7.4+ natively - fully compatible with OSMO
  # Default: enabled=false uses Azure Managed Redis from terraform (recommended)
  # Set enabled=true only for local testing without Azure Redis
  redis:
    enabled: false  # DEFAULT: Use Azure Managed Redis from terraform (Redis 7.4+)

    # External Redis settings (configured automatically via helm --set from terraform outputs)
    # serviceName: "<your-redis>.redis.azure.net"
    # port: 10000

  # Main API service configuration
  service:
    scaling:
      minReplicas: 1
      maxReplicas: 3

    # Resource allocation - reduced for constrained system node pools
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        memory: "1Gi"

  # Router service configuration (folded from the standalone router chart in 6.3).
  # Reduced replicas/resources for constrained system node pools; the router shares
  # the service workload-identity ServiceAccount, so no separate identity override.
  router:
    scaling:
      minReplicas: 1
      maxReplicas: 2
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        memory: "512Mi"

  # UI service configuration (folded from the standalone web-ui chart in 6.3).
  # apiHostname is also set via --set in 03-deploy so the UI reaches the API
  # service directly while the gateway tier is disabled.
  ui:
    enabled: true
    apiHostname: "osmo-service.osmo-control-plane.svc.cluster.local:80"
    # Resource allocation - reduced for constrained system node pools
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        memory: "512Mi"

  # Worker service configuration
  worker:
    scaling:
      minReplicas: 1
      maxReplicas: 3
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        memory: "800Mi"

  # Logger service configuration
  logger:
    scaling:
      minReplicas: 1
      maxReplicas: 3
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        memory: "512Mi"

  # Agent service configuration
  agent:
    scaling:
      minReplicas: 1
      maxReplicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        memory: "256Mi"

  # Delayed job monitor configuration
  delayedJobMonitor:
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        memory: "512Mi"

# Gateway tier configuration (replaces the per-chart sidecars model in 6.3).
# Disabled here so OSMO uses Tier-2 defaultAdmin token auth behind the AzureML
# internal-LB nginx ingress instead of the chart's public LoadBalancer NLB.
# These disables are also passed via --set in 03-deploy (the script flags are the
# source of truth); they are mirrored here for clarity.
# To enable Tier-3 (IdP) auth, set these to true and configure the gateway's
# Envoy jwt.providers / oauth2Proxy OIDC settings per the chart values.
gateway:
  envoy:
    enabled: false
  oauth2Proxy:
    enabled: false
  authz:
    enabled: false
