# Default configuration for infrastructure setup deployment scripts
# Override via command-line arguments or environment variables

# Helm Chart Versions
GPU_OPERATOR_VERSION="${GPU_OPERATOR_VERSION:-v26.3.2}"
KAI_SCHEDULER_VERSION="${KAI_SCHEDULER_VERSION:-v0.20.1}"
OSMO_CHART_VERSION="${OSMO_CHART_VERSION:-1.3.0}"
OSMO_IMAGE_VERSION="${OSMO_IMAGE_VERSION:-6.3.0}"
OSMO_PRERELEASE_CHART_VERSION="${OSMO_PRERELEASE_CHART_VERSION:-1.3.0}"
OSMO_PRERELEASE_IMAGE_VERSION="${OSMO_PRERELEASE_IMAGE_VERSION:-6.3.0}"
OSMO_USE_PRERELEASE="${OSMO_USE_PRERELEASE:-false}"
NGC_API_KEY="${NGC_API_KEY:-}"
NVCR_PULL_SECRET="${NVCR_PULL_SECRET:-nvcr-pull-secret}"

# Kubernetes Namespaces
NS_OSMO_CONTROL_PLANE="${NS_OSMO_CONTROL_PLANE:-osmo-control-plane}"
NS_OSMO_OPERATOR="${NS_OSMO_OPERATOR:-osmo-operator}"
NS_OSMO_WORKFLOWS="${NS_OSMO_WORKFLOWS:-osmo-workflows}"
NS_AZUREML="${NS_AZUREML:-azureml}"
NS_GPU_OPERATOR="${NS_GPU_OPERATOR:-gpu-operator}"
NS_KAI_SCHEDULER="${NS_KAI_SCHEDULER:-kai-scheduler}"

# Secret Names
SECRET_MEK="${SECRET_MEK:-mek-config}"
SECRET_POSTGRES="${SECRET_POSTGRES:-db-secret}"
SECRET_REDIS="${SECRET_REDIS:-redis-secret}"

# Timeouts
TIMEOUT_DEPLOY="${TIMEOUT_DEPLOY:-600s}"

# Helm Repositories
HELM_REPO_GPU_OPERATOR="${HELM_REPO_GPU_OPERATOR:-https://helm.ngc.nvidia.com/nvidia}"
HELM_REPO_KAI="${HELM_REPO_KAI:-oci://ghcr.io/nvidia/kai-scheduler}"
HELM_REPO_OSMO="${HELM_REPO_OSMO:-https://helm.ngc.nvidia.com/nvidia/osmo}"

# Helm Chart SHA256 Hashes (opt-in integrity verification)
# Populate with: helm pull <chart-ref> --version <ver> && sha256sum <chart>.tgz
# Leave empty to skip verification for a given chart.
GPU_OPERATOR_CHART_SHA256="${GPU_OPERATOR_CHART_SHA256:-b6b7b7a6d40bb8420d50e46c1169c097028ad19a0457d32156568db8214af77f}"
KAI_SCHEDULER_CHART_SHA256="${KAI_SCHEDULER_CHART_SHA256:-1152f5582dbbf3985202a6e2c5bdc35f0e4dc647568aa59b86920e246a9584b1}"
OSMO_SERVICE_CHART_SHA256="${OSMO_SERVICE_CHART_SHA256:-03e3e32cdd14a5e5c5cb5abba4f86d5be35c281c40c8c97d43fb0e9a8633960b}"
OSMO_BACKEND_CHART_SHA256="${OSMO_BACKEND_CHART_SHA256:-1ec3da826f5076cd86361f0732a58119dbde970325dff9f7edb91a48a9730b5c}"

# Default Terraform Directory (relative to infrastructure/setup)
DEFAULT_TF_DIR="${DEFAULT_TF_DIR:-../terraform}"

# OSMO Component Names
OSMO_SERVICE_CHART="${OSMO_SERVICE_CHART:-service}"
OSMO_BACKEND_CHART="${OSMO_BACKEND_CHART:-backend-operator}"

# Workload Identity Defaults
WORKFLOW_SERVICE_ACCOUNT="${WORKFLOW_SERVICE_ACCOUNT:-osmo-workflow}"

