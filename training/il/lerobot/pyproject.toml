[project]
name = "robotics-training-il"
version = "0.1.0"
description = "LeRobot workflow runtime dependencies"
requires-python = ">=3.12"
dependencies = [
    "numpy==2.2.6",
    "azure-core==1.38.1",
    "azure-storage-blob==12.19.0",
    "azure-identity==1.25.2",
    "azure-ai-ml==1.32.0",
    "marshmallow==3.26.2",
    "mlflow==3.11.1",
    "packaging==25.0",
    "psutil==7.2.2",
    "pynvml==13.0.1",
    "pyperclip==1.11.0",
    "datasets==4.8.4",
    "huggingface-hub[hf_xet]==0.35.2",
    "lerobot==0.4.4",
    "pyarrow==23.0.1",
    "torchcodec==0.10.0; platform_machine == 'x86_64' or platform_machine == 'AMD64'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = false
