workflow:
  name: isaaclab-inline-training
  timeout:
    exec_timeout: 23h
  resources:
    default:
      gpu: {{ gpu }}
      cpu: {{ cpu }}
      memory: {{ memory }}
      storage: {{ storage }}
      platform: gpu_platform
  tasks:
    - name: isaac-training
      image: "{{ image }}"
      command:
        - /bin/bash
        - /tmp/entry.sh
      inputs:
        - url: "{{ code_url }}"
          regex: ".*"
      environment:
        NVIDIA_DRIVER_CAPABILITIES: "all"
        TASK: "{{ task }}"
        NUM_ENVS: "{{ num_envs }}"
        MAX_ITERATIONS: "{{ max_iterations }}"
        ACCEPT_EULA: "Y"
        PRIVACY_CONSENT: "Y"
        PAYLOAD_ROOT: "{{ payload_root }}"
        SLEEP_AFTER_UNPACK: "{{ sleep_after_unpack }}"
        AZURE_SUBSCRIPTION_ID: "{{ azure_subscription_id }}"
        AZURE_RESOURCE_GROUP: "{{ azure_resource_group }}"
        AZUREML_WORKSPACE_NAME: "{{ azure_workspace_name }}"
        AZURE_AUTHORITY_HOST: "{{ azure_authority_host }}"
        MLFLOW_TRACKING_TOKEN_REFRESH_RETRIES: "{{ mlflow_token_refresh_retries }}"
        MLFLOW_HTTP_REQUEST_TIMEOUT: "{{ mlflow_http_request_timeout }}"
        MLFLOW_CORRELATION_ID: "{{ mlflow_correlation_id }}"
        RUN_AZURE_SMOKE_TEST: "{{ run_azure_smoke_test }}"
        PYTHON: "{{ python }}"
        CHECKPOINT_URI: "{{ checkpoint_uri }}"
        CHECKPOINT_MODE: "{{ checkpoint_mode }}"
        REGISTER_CHECKPOINT: "{{ register_checkpoint }}"
        TRAINING_BACKEND: "{{ training_backend }}"
      files:
        - path: /tmp/entry.sh
          contents: |
            #!/bin/bash
            set -euo pipefail

            PAYLOAD_ROOT="${PAYLOAD_ROOT:-/workspace/isaac_payload}"
            TRAINING_ROOT="${TRAINING_ROOT:-${PAYLOAD_ROOT}/training/rl}"

            mkdir -p "${PAYLOAD_ROOT}"
            # Code is delivered via the OSMO url: input (object storage), not an
            # env var: a single env string is capped at 128 KiB (MAX_ARG_STRLEN)
            # and the archive exceeds that, failing the container execve E2BIG.
            ARCHIVE_PATH="$(find "{{input:0}}" -maxdepth 2 -name '*.zip' | head -n1)"
            if [[ -z "${ARCHIVE_PATH}" || ! -s "${ARCHIVE_PATH}" ]]; then
              echo "ERROR: no code archive found under the input mount; training payload is required." >&2
              ls -laR "{{input:0}}" || true
              exit 1
            fi
            unzip -oq "${ARCHIVE_PATH}" -d "${PAYLOAD_ROOT}"

            if [[ -n "${SLEEP_AFTER_UNPACK:-}" ]]; then
              echo "SLEEP_AFTER_UNPACK set; sleeping for ${SLEEP_AFTER_UNPACK} after payload unpack"
              sleep "${SLEEP_AFTER_UNPACK}"
              echo "Finished post-unpack sleep; exiting"
              exit 0
            fi

            MODE="train"
            if [[ "${RUN_AZURE_SMOKE_TEST:-0}" == "1" ]]; then
              MODE="smoke-test"
            fi

            train_args=(
              --mode "${MODE}"
              --task "${TASK:-}"
              --num_envs "${NUM_ENVS:-}"
              --checkpoint-uri "${CHECKPOINT_URI:-}"
              --checkpoint-mode "${CHECKPOINT_MODE:-from-scratch}"
              --register-checkpoint "${REGISTER_CHECKPOINT:-}"
              --headless
            )
            [[ -n "${MAX_ITERATIONS:-}" ]] && train_args+=(--max_iterations "${MAX_ITERATIONS}")

            bash "${TRAINING_ROOT}/scripts/train.sh" "${train_args[@]}"

default-values:
  # Submission scripts set image from scripts/lib/common.sh via --set-string.
  # This value is the direct-workflow fallback; keep it in sync with DEFAULT_ISAAC_LAB_IMAGE.
  image: nvcr.io/nvidia/isaac-lab:2.3.2
  task: Isaac-Velocity-Rough-Anymal-C-v0
  num_envs: "2048"
  max_iterations: ""
  code_url: ""
  payload_root: /workspace/isaac_payload
  sleep_after_unpack: ""
  azure_subscription_id: ""
  azure_resource_group: ""
  azure_workspace_name: ""
  azure_authority_host: https://login.microsoftonline.com
  mlflow_token_refresh_retries: "3"
  mlflow_http_request_timeout: "60"
  mlflow_correlation_id: ""
  python: "/workspace/isaaclab/isaaclab.sh -p"
  run_azure_smoke_test: "0"
  checkpoint_uri: ""
  checkpoint_mode: "from-scratch"
  register_checkpoint: ""
  training_backend: "skrl"
  gpu: "1"
  cpu: "30"
  memory: 400Gi
  storage: 200Gi

