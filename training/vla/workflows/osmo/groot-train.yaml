# GR00T Fine-tuning Workflow for OSMO
#
# Downloads a LeRobot-format dataset from Azure Blob Storage and fine-tunes
# an NVIDIA GR00T model on AKS GPU nodes. Checkpoints are written to pod
# ephemeral storage and optionally mirrored to Azure ML.
#
# Usage:
#   osmo workflow submit groot-train.yaml --set blob_url=https://<account>.blob.core.windows.net/<container>/<path>
#   osmo workflow submit groot-train.yaml --set blob_url=... max_steps=2000 batch_size=16
workflow:
  name: "{{workflow_name}}"

  resources:
    default:
      cpu: 14
      memory: 48Gi
      storage: 200Gi
      gpu: {{gpu}}
      platform: "{{platform}}"

  timeout:
    exec_timeout: 2d
    queue_timeout: 4h

  tasks:
    - name: train
      image: "{{image}}"
      command: ["bash"]
      args: ["/tmp/train.sh"]
      environment:
        BLOB_URL: "{{blob_url}}"
        DATASET_PATH: "{{dataset_path}}"
        OUTPUT_ROOT: "/outputs"
        DATA_CONFIG: "{{data_config}}"
        BASE_MODEL: "{{base_model}}"
        BATCH_SIZE: "{{batch_size}}"
        MAX_STEPS: "{{max_steps}}"
        SAVE_STEPS: "{{save_steps}}"
        DATALOADER_WORKERS: "{{dataloader_workers}}"
        EMBODIMENT_TAG: "{{embodiment_tag}}"
        ISAAC_GROOT_REF: "{{isaac_groot_ref}}"
        RUN_ID_OVERRIDE: "{{run_id_override}}"
        RESUME: "{{resume}}"
        AZURE_UPLOAD: "{{azure_upload}}"
        AZURE_SUBSCRIPTION_ID: "{{azure_subscription_id}}"
        AZUREML_RESOURCE_GROUP: "{{azureml_resource_group}}"
        AZUREML_WORKSPACE_NAME: "{{azureml_workspace_name}}"
        AZUREML_MODEL_NAME: "{{azureml_model_name}}"
        DATA_CONFIG_B64: "{{data_config_b64}}"
        MODALITY_CONFIG_B64: "{{modality_config_b64}}"
        ACR_REGISTRY: "{{acr_registry}}"
        ACR_MODEL_REPO: "{{acr_model_repo}}"
        HF_TOKEN: "{{hf_token}}"
        PYTHONUNBUFFERED: "1"
        PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      files:
        - path: /tmp/download_blob.py
          contents: |
            """Download a LeRobot dataset from Azure Blob Storage."""
            import os
            import pathlib
            from urllib.parse import urlparse
            from azure.storage.blob import ContainerClient
            from azure.identity import DefaultAzureCredential
            from azure.core.exceptions import HttpResponseError

            url = os.environ["BLOB_URL"]
            parsed = urlparse(url)
            if parsed.scheme != "https" or not parsed.netloc:
              raise SystemExit(f"Invalid BLOB_URL: {url}")

            path_parts = parsed.path.lstrip("/").split("/", 1)
            if len(path_parts) < 2 or not path_parts[0] or not path_parts[1]:
              raise SystemExit(
                "BLOB_URL must include account/container/prefix, "
                f"got: {url}"
              )

            container = path_parts[0]
            prefix = path_parts[1].rstrip("/")
            endpoint = f"https://{parsed.netloc}"
            sas_token = parsed.query if parsed.query else None

            DATASET_ROOT = pathlib.Path(os.environ.get("DATASET_PATH", "/data/dataset")).resolve()
            DATASET_ROOT.mkdir(parents=True, exist_ok=True)

            def safe_local_path(blob_name: str, rel: str) -> pathlib.Path | None:
              # Reject absolute paths and any segment that would escape the root.
              if rel.startswith("/") or "\\" in rel:
                print(f"  WARN: skipping unsafe blob path: {blob_name}")
                return None
              candidate = (DATASET_ROOT / rel).resolve()
              try:
                candidate.relative_to(DATASET_ROOT)
              except ValueError:
                print(f"  WARN: skipping blob that escapes dataset root: {blob_name}")
                return None
              return candidate

            def download_with_client(client: ContainerClient) -> int:
              count = 0
              for blob in client.list_blobs(name_starts_with=prefix):
                rel = blob.name[len(prefix):].lstrip("/")
                if not rel:
                  continue
                local = safe_local_path(blob.name, rel)
                if local is None:
                  continue
                local.parent.mkdir(parents=True, exist_ok=True)
                with open(local, "wb") as f:
                  f.write(client.download_blob(blob).readall())
                count += 1
                if count <= 20:
                  print(f"  {blob.name} -> {local}")
              if count > 20:
                print(f"  ... and {count - 20} more files")
              return count

            if sas_token:
              sas_client = ContainerClient(endpoint, container, credential=sas_token)
              count = download_with_client(sas_client)
              print(f"Downloaded {count} files to {DATASET_ROOT}/ using SAS token")
              raise SystemExit(0)

            cred_client = None
            try:
              cred = DefaultAzureCredential()
              cred_client = ContainerClient(endpoint, container, credential=cred)
            except Exception:
              pass

            if cred_client is not None:
              try:
                count = download_with_client(cred_client)
                print(f"Downloaded {count} files to {DATASET_ROOT}/")
                raise SystemExit(0)
              except HttpResponseError as err:
                if getattr(err, "error_code", None) not in {"AuthorizationFailure", "AuthenticationFailed"}:
                  raise
                print("Credentialed blob access failed; retrying anonymous access")

            anon_client = ContainerClient(endpoint, container)
            count = download_with_client(anon_client)
            print(f"Downloaded {count} files to {DATASET_ROOT}/")
        - path: /tmp/mlflow_log.py
          contents: |
            """Mirror an OSMO training run to Azure ML.

            Logs hyperparameters + tensorboard scalars + the final HF
            checkpoint as artifacts under an MLflow run, then registers
            the artifacts as a new version of $AZUREML_MODEL_NAME.
            Auth uses DefaultAzureCredential (workload identity on AKS).

            Required env: AZURE_SUBSCRIPTION_ID, AZUREML_RESOURCE_GROUP,
            AZUREML_WORKSPACE_NAME, AZUREML_MODEL_NAME, RUN_ID, OUTPUT_DIR
            """
            import glob, json, os, pathlib, shutil, sys, tempfile

            os.environ.setdefault("AZUREML_ARTIFACTS_DEFAULT_TIMEOUT", "7200")

            import mlflow
            from azure.ai.ml import MLClient
            from azure.identity import DefaultAzureCredential

            REQUIRED = [
                "AZURE_SUBSCRIPTION_ID", "AZUREML_RESOURCE_GROUP",
                "AZUREML_WORKSPACE_NAME", "AZUREML_MODEL_NAME",
                "RUN_ID", "OUTPUT_DIR",
            ]
            missing = [k for k in REQUIRED if not os.environ.get(k)]
            if missing:
                sys.exit(f"Azure ML mirror: missing env vars: {missing}")

            output_dir = pathlib.Path(os.environ["OUTPUT_DIR"])
            if not output_dir.exists():
                sys.exit(f"Azure ML mirror: {output_dir} does not exist")

            cred = DefaultAzureCredential()
            ml_client = MLClient(
                credential=cred,
                subscription_id=os.environ["AZURE_SUBSCRIPTION_ID"],
                resource_group_name=os.environ["AZUREML_RESOURCE_GROUP"],
                workspace_name=os.environ["AZUREML_WORKSPACE_NAME"],
            )
            ws = ml_client.workspaces.get(os.environ["AZUREML_WORKSPACE_NAME"])
            mlflow.set_tracking_uri(ws.mlflow_tracking_uri)
            mlflow.set_experiment(os.environ["AZUREML_MODEL_NAME"])

            run_name = os.environ["RUN_ID"]
            with mlflow.start_run(run_name=run_name) as run:
                mlflow.log_params({
                    k: os.environ[k]
                    for k in (
                        "DATA_CONFIG", "BASE_MODEL", "BATCH_SIZE",
                        "MAX_STEPS", "SAVE_STEPS", "DATALOADER_WORKERS",
                        "EMBODIMENT_TAG", "ISAAC_GROOT_REF",
                    )
                    if os.environ.get(k) is not None
                })
                mlflow.set_tag("osmo.run_id", run_name)
                mlflow.set_tag("osmo.output_dir", str(output_dir))

                tb_dir = output_dir / "runs"
                if tb_dir.exists():
                    mlflow.log_artifacts(str(tb_dir), artifact_path="tensorboard")
                    print(f"logged tensorboard from {tb_dir}")

                ckpts = sorted(
                    glob.glob(str(output_dir / "checkpoint-*")),
                    key=lambda p: int(p.rsplit("-", 1)[-1]) if p.rsplit("-", 1)[-1].isdigit() else -1,
                )
                if not ckpts:
                    sys.exit("Azure ML mirror: no checkpoint-* dirs found; aborting model registration")
                final = pathlib.Path(ckpts[-1])

                SKIP_NAMES = {"optimizer.pt", "optimizer.bin",
                              "scheduler.pt", "rng_state.pth"}
                staging_root = output_dir / ".aml-staging"
                staging_root.mkdir(exist_ok=True)
                staged = pathlib.Path(tempfile.mkdtemp(prefix="aml-upload-", dir=str(staging_root)))
                try:
                    for src in final.rglob("*"):
                        if src.is_dir():
                            continue
                        if src.name in SKIP_NAMES:
                            continue
                        rel = src.relative_to(final)
                        dst = staged / rel
                        dst.parent.mkdir(parents=True, exist_ok=True)
                        try:
                            os.link(src, dst)
                        except OSError:
                            shutil.copy2(src, dst)
                    staged_size = sum(p.stat().st_size for p in staged.rglob("*") if p.is_file())
                    print(f"staged {final} -> {staged} ({staged_size/1024**3:.2f} GiB) for upload")
                    mlflow.log_artifacts(str(staged), artifact_path="model")
                    print(f"logged final checkpoint: {final}")
                finally:
                    shutil.rmtree(staged, ignore_errors=True)

                model_uri = f"runs:/{run.info.run_id}/model"
                registered = mlflow.register_model(
                    model_uri=model_uri,
                    name=os.environ["AZUREML_MODEL_NAME"],
                )
                print(json.dumps({
                    "mlflow_run_id": run.info.run_id,
                    "model_name":    registered.name,
                    "model_version": registered.version,
                    "checkpoint":    str(final),
                }, indent=2))
        - path: /tmp/train.sh
          contents: |
            #!/usr/bin/env bash
            set -Eeuo pipefail

            trap 'exit_code=$?; echo "ERROR: command failed (line ${LINENO}): ${BASH_COMMAND} (exit ${exit_code})" >&2' ERR

            retry_cmd() {
              local max_attempts="$1"
              shift
              local attempt=1
              while true; do
                if "$@"; then
                  return 0
                fi
                if [ "${attempt}" -ge "${max_attempts}" ]; then
                  echo "ERROR: command failed after ${attempt} attempts: $*" >&2
                  return 1
                fi
                attempt=$((attempt + 1))
                echo "WARN: retry ${attempt}/${max_attempts}: $*" >&2
              done
            }

            if [ -d "${DATASET_PATH}" ] && [ -n "$(ls -A "${DATASET_PATH}" 2>/dev/null)" ]; then
              echo "--- using existing local dataset at ${DATASET_PATH} ---"
              ls -lh "${DATASET_PATH}/" | head
            elif [ -n "${BLOB_URL:-}" ]; then
              echo "--- downloading dataset from Azure Blob ---"
              mkdir -p "${DATASET_PATH}"
              export DEBIAN_FRONTEND=noninteractive
              retry_cmd 3 apt-get update -qq
              retry_cmd 3 apt-get install -y --no-install-recommends curl >/dev/null
              pip install --quiet azure-storage-blob azure-identity
              python3 /tmp/download_blob.py
              echo "--- dataset download complete ---"
              ls -lh "${DATASET_PATH}/" | head
            else
              echo "ERROR: no local dataset at ${DATASET_PATH} and BLOB_URL is not set" >&2
              exit 1
            fi

            if [ -n "${RUN_ID_OVERRIDE:-}" ]; then
              RUN_ID="${RUN_ID_OVERRIDE}"
              echo "RUN_ID_OVERRIDE set: reusing existing output dir ${RUN_ID}"
            else
              RUN_ID="${WF_ID:-run-$(date -u +%Y%m%d-%H%M%S)}"
            fi
            OUTPUT_DIR="${OUTPUT_ROOT}/${RUN_ID}"
            mkdir -p "${OUTPUT_DIR}"

            if [ "${RESUME:-false}" = "true" ]; then
              RESUME_FLAG="--resume"
              LATEST_CKPT="$(ls -1d ${OUTPUT_DIR}/checkpoint-* 2>/dev/null | sort -t- -k2 -n | tail -1 || true)"
              if [ -z "${LATEST_CKPT}" ]; then
                echo "ERROR: RESUME=true but no checkpoint-* found in ${OUTPUT_DIR}" >&2
                exit 1
              fi
              echo "Resuming from checkpoint: ${LATEST_CKPT}"
            else
              RESUME_FLAG="--no-resume"
            fi

            echo "========================================================"
            echo " LeRobot / GR00T fine-tune"
            echo "   node:        $(hostname)"
            echo "   date (utc):  $(date -u)"
            echo "   dataset:     ${DATASET_PATH}"
            echo "   output:      ${OUTPUT_DIR}"
            echo "   base model:  ${BASE_MODEL}"
            echo "   data config: ${DATA_CONFIG}"
            echo "   batch_size:  ${BATCH_SIZE}"
            echo "   max_steps:   ${MAX_STEPS}"
            echo "========================================================"

            nvidia-smi
            df -h /dev/shm /outputs || true
            echo "--- dataset ---"; ls -1 "${DATASET_PATH}" | head
            echo "--- dataset/meta ---"; ls -1 "${DATASET_PATH}/meta" | head

            export DEBIAN_FRONTEND=noninteractive
            retry_cmd 3 apt-get update -qq
            retry_cmd 3 apt-get install -y --no-install-recommends \
              git git-lfs build-essential cmake ffmpeg \
              libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev \
              libvulkan-dev ca-certificates wget curl >/dev/null

            cd /workspace || cd /tmp
            if [ ! -d Isaac-GR00T ]; then
              echo "--- cloning Isaac-GR00T ---"
              retry_cmd 3 git clone https://github.com/NVIDIA/Isaac-GR00T.git
            fi
            cd Isaac-GR00T
            git lfs install --system || true

            echo "--- checking out ref: ${ISAAC_GROOT_REF} ---"
            if ! git checkout "${ISAAC_GROOT_REF}"; then
              echo "WARN: initial checkout failed; fetching ref then retrying" >&2
              git fetch origin "${ISAAC_GROOT_REF}" --depth 1 || true
              git checkout "${ISAAC_GROOT_REF}"
            fi

            # GR00T N1.7+ pins python==3.10.*; the default pytorch image ships
            # python 3.11. Create a conda env when the active interpreter is
            # not 3.10 so the editable install can resolve.
            if [ -f "gr00t/experiment/launch_finetune.py" ]; then
              CURRENT_PY="$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
              if [ "${CURRENT_PY}" != "3.10" ] && command -v conda >/dev/null 2>&1; then
                echo "[setup] GR00T N1.7 requires Python 3.10 (active: ${CURRENT_PY}); creating conda env"
                conda create -y -n gr00t-py310 python=3.10
                # shellcheck disable=SC1091
                source /opt/conda/etc/profile.d/conda.sh
                conda activate gr00t-py310
                pip install --upgrade pip setuptools wheel
                pip install azure-identity azure-storage-blob
              fi
            fi

            pip install --upgrade setuptools wheel
            pip install gpustat wandb==0.19.0 packaging ninja

            GPU_PRODUCT="$(nvidia-smi --query-gpu=name --format=csv,noheader 2>/dev/null | head -1 || true)"
            echo "Detected GPU: ${GPU_PRODUCT}"
            if echo "${GPU_PRODUCT}" | grep -qiE '5090|5080|5070|B100|B200'; then
              IS_BLACKWELL=1
            else
              IS_BLACKWELL=0
            fi

            if [ "${IS_BLACKWELL}" = "1" ]; then
              TORCH_INDEX_ARGS="--index-url https://download.pytorch.org/whl/cu128"
              TORCH_VER="2.7.0"
              TV_VER="0.22.0"
              TA_VER="2.7.0"
              FLASH_ATTN_VER="2.7.4.post1"
            else
              # Match gr00t==0.1.0 pins so `pip install -e .[base]` does not trigger
              # an isolated rebuild of flash-attn (which fails: torch missing in build env).
              TORCH_INDEX_ARGS=""
              TORCH_VER="2.7.1"
              TV_VER="0.22.1"
              TA_VER="2.7.1"
              FLASH_ATTN_VER="2.7.4.post1"
            fi

            # Keep flash-attn builds bounded when a wheel is unavailable.
            export MAX_JOBS="${MAX_JOBS:-2}"
            export NVCC_THREADS="${NVCC_THREADS:-1}"

            if [ -n "${TORCH_INDEX_ARGS}" ]; then
              pip install --force-reinstall --timeout 600 --retries 5 \
                ${TORCH_INDEX_ARGS} \
                torch=="${TORCH_VER}" torchvision=="${TV_VER}" torchaudio=="${TA_VER}" numpy==1.26.4
            else
              pip install --force-reinstall --timeout 600 --retries 5 \
                torch=="${TORCH_VER}" torchvision=="${TV_VER}" torchaudio=="${TA_VER}" numpy==1.26.4
            fi

            pip install --force-reinstall --timeout 600 --retries 5 --prefer-binary --no-build-isolation \
              flash_attn=="${FLASH_ATTN_VER}"

            pip install -e .[base]
            pip uninstall -y transformer-engine || true
            pip uninstall -y opencv-python opencv-python-headless || true
            rm -rf /usr/local/lib/python3.10/dist-packages/cv2 /usr/local/lib/python3.11/dist-packages/cv2 || true
            pip install opencv-python==4.8.0.74

            if [ -n "${TORCH_INDEX_ARGS}" ]; then
              pip install --force-reinstall --timeout 600 --retries 5 \
                ${TORCH_INDEX_ARGS} \
                torch=="${TORCH_VER}" torchvision=="${TV_VER}" torchaudio=="${TA_VER}" numpy==1.26.4
            else
              pip install --force-reinstall --timeout 600 --retries 5 \
                torch=="${TORCH_VER}" torchvision=="${TV_VER}" torchaudio=="${TA_VER}" numpy==1.26.4
            fi
            pip install --force-reinstall --timeout 600 --retries 5 --prefer-binary --no-deps --no-build-isolation \
              flash_attn=="${FLASH_ATTN_VER}"
            python -c "import torch, torchvision, flash_attn; print('torch=', torch.__version__, 'tv=', torchvision.__version__, 'cuda=', torch.version.cuda, 'flash_attn=', flash_attn.__version__)"

            pip install -e . --no-deps
            pip install "accelerate>=0.26.0"
            pip install torchcodec || true

            if [ -n "${DATA_CONFIG_B64:-}" ]; then
              DATA_CFG_PY="$(pwd)/gr00t/experiment/data_config.py"
              echo "${DATA_CONFIG_B64}" | base64 -d >> "${DATA_CFG_PY}"
              echo "  patched ${DATA_CFG_PY} with custom data config (${DATA_CONFIG})"
            fi

            if [ -n "${MODALITY_CONFIG_B64:-}" ]; then
              echo "${MODALITY_CONFIG_B64}" | base64 -d > /tmp/modality_config.py
              echo "  wrote modality config to /tmp/modality_config.py"
            fi

            python -c "import torch; p=torch.cuda.get_device_properties(0); print(f'[preflight] GPU: {p.name}  total={p.total_memory/1024**3:.2f} GiB  sm={p.major}.{p.minor}')"

            echo "--- starting training ---"
            if [ -f "scripts/gr00t_finetune.py" ]; then
              echo "  N1.5/N1.6 branch: using scripts/gr00t_finetune.py"
              python scripts/gr00t_finetune.py \
                --dataset-path "${DATASET_PATH}" \
                --output-dir "${OUTPUT_DIR}" \
                --data-config "${DATA_CONFIG}" \
                --batch-size "${BATCH_SIZE}" \
                --max-steps "${MAX_STEPS}" \
                --num-gpus 1 \
                --save-steps "${SAVE_STEPS}" \
                --base-model-path "${BASE_MODEL}" \
                --no-tune-llm \
                --tune-visual \
                --tune-projector \
                --tune-diffusion-model \
                ${RESUME_FLAG} \
                --dataloader-num-workers "${DATALOADER_WORKERS}" \
                --report-to tensorboard \
                --embodiment-tag "${EMBODIMENT_TAG}"
            elif [ -f "gr00t/experiment/launch_finetune.py" ]; then
              echo "  N1.7+ branch: using gr00t/experiment/launch_finetune.py"
              FINETUNE_ARGS=(
                --base_model_path "${BASE_MODEL}"
                --dataset_path "${DATASET_PATH}"
                --embodiment_tag "${EMBODIMENT_TAG}"
                --output_dir "${OUTPUT_DIR}"
                --max_steps "${MAX_STEPS}"
                --save_steps "${SAVE_STEPS}"
                --global_batch_size "${BATCH_SIZE}"
                --dataloader_num_workers "${DATALOADER_WORKERS}"
                --num_gpus 1
                --tune_diffusion_model
                --tune_projector
                --save_total_limit 5
                --warmup_ratio 0.05
                --weight_decay 1e-5
                --learning_rate 1e-4
              )
              if [ -f "/tmp/modality_config.py" ]; then
                FINETUNE_ARGS+=(--modality_config_path /tmp/modality_config.py)
              fi
              export CUDA_VISIBLE_DEVICES="${CUDA_VISIBLE_DEVICES:-0}"
              python gr00t/experiment/launch_finetune.py "${FINETUNE_ARGS[@]}"
            else
              echo "ERROR: no finetune script found in Isaac-GR00T" >&2; exit 1
            fi

            echo "--- training done ---"
            du -sh "${OUTPUT_DIR}"
            ls -lh "${OUTPUT_DIR}" | head

            if [ "${AZURE_UPLOAD:-false}" = "true" ]; then
              if [ -z "${AZUREML_WORKSPACE_NAME:-}" ] || [ -z "${AZURE_SUBSCRIPTION_ID:-}" ]; then
                echo "AZURE_UPLOAD=true but AZUREML_WORKSPACE_NAME or AZURE_SUBSCRIPTION_ID not set. Skipping." >&2
              else
                echo "--- mirroring run to Azure ML ---"
                pip install --quiet \
                  'mlflow>=2.10,<3' \
                  'azureml-mlflow>=1.55' \
                  'azure-identity>=1.17' \
                  'azure-ai-ml>=1.20'
                RUN_ID="${RUN_ID}" OUTPUT_DIR="${OUTPUT_DIR}" \
                  python /tmp/mlflow_log.py || \
                  echo "WARN: Azure ML mirror failed; local run at ${OUTPUT_DIR} is unaffected." >&2
              fi
            fi

            if [ -n "${ACR_REGISTRY:-}" ]; then
              echo "--- pushing model to ACR: ${ACR_REGISTRY} ---"
              ORAS_VERSION="1.2.0"
              curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
              tar xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" -C /usr/local/bin/ oras
              chmod +x /usr/local/bin/oras
              rm -f "oras_${ORAS_VERSION}_linux_amd64.tar.gz"

              pip install --quiet azure-identity
              ACR_HOST="${ACR_REGISTRY}.azurecr.io"
              az login --identity --allow-no-subscriptions 2>/dev/null && \
                az acr login --name "${ACR_REGISTRY}" 2>/dev/null || {
                echo "  az acr login unavailable; authenticating oras via workload identity token"
                ACR_REFRESH=$(python3 -c "import requests; from azure.identity import DefaultAzureCredential; aad=DefaultAzureCredential().get_token('https://management.azure.com/.default').token; r=requests.post('https://${ACR_HOST}/oauth2/exchange', data={'grant_type':'access_token','service':'${ACR_HOST}','access_token':aad}); r.raise_for_status(); print(r.json()['refresh_token'])")
                printf '%s' "${ACR_REFRESH}" | oras login "${ACR_HOST}" --username 00000000-0000-0000-0000-000000000000 --password-stdin
                unset ACR_REFRESH
              }

              FINAL_CKPT="$(ls -1d ${OUTPUT_DIR}/checkpoint-* 2>/dev/null | sort -t- -k2 -n | tail -1 || true)"
              if [ -z "${FINAL_CKPT}" ]; then
                echo "WARN: no checkpoint-* dirs found; skipping ACR push" >&2
              else
                STEP="$(basename "${FINAL_CKPT}" | sed 's/checkpoint-//')"
                MODEL_REPO="${ACR_MODEL_REPO:-models/groot}"
                TAG="${RUN_ID}-step${STEP}"
                REF="${ACR_HOST}/${MODEL_REPO}:${TAG}"

                echo "  checkpoint: ${FINAL_CKPT}"
                echo "  pushing to: ${REF}"
                cd "${FINAL_CKPT}"
                oras push "${REF}" \
                  --annotation "org.opencontainers.image.title=${MODEL_REPO}" \
                  --annotation "training.run_id=${RUN_ID}" \
                  --annotation "training.step=${STEP}" \
                  --annotation "training.base_model=${BASE_MODEL}" \
                  ./:application/vnd.nvidia.groot.checkpoint.v1 || \
                  echo "WARN: ACR push failed; local checkpoint at ${FINAL_CKPT} is unaffected." >&2
                cd -
                echo "  ACR push complete: ${REF}"
              fi
            fi

            echo "TRAIN_RESULT=PASS"

default-values:
  workflow_name: groot-train
  image: pytorch/pytorch:2.6.0-cuda12.4-cudnn9-devel
  gpu: 1
  platform: h100gpu_platform
  blob_url: ""
  dataset_path: "/data/dataset"
  data_config: ""
  data_config_b64: ""
  modality_config_b64: ""
  base_model: ""
