# Kyverno ClusterPolicy: Sigstore (cosign keyless) signature verification.
#
# Scope guard (addresses user requirement):
#   This project signs only the container images it produces (published by the
#   .github/workflows/container-publish.yml reusable workflow into the project
#   ACR). Customer-deployed images (third-party charts, application images
#   from other registries, etc.) MUST NOT be blocked or required to carry our
#   signature. The two rules below enforce that boundary:
#
#     Rule 1 (require-signed-images-acr) - Enforce
#       Match:  ${ACR_LOGIN_SERVER}/* only
#       Effect: blocks unsigned images from this project's ACR
#
#     Rule 2 (audit-all-other-images) - Audit
#       Match:  *
#       Exclude: ${ACR_LOGIN_SERVER}/*
#       Effect: emits PolicyReport entries only; does not block admission
#
# ${ACR_LOGIN_SERVER} is substituted by Flux (postBuild.substituteFrom) at
# reconcile time using the workflow-config ConfigMap shipped per cluster.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-images-sigstore
  annotations:
    policies.kyverno.io/title: Verify Sigstore signatures on project images
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Enforces Sigstore cosign keyless signatures on images published from
      this project's ACR. All other images are audited (not blocked) so that
      operators can deploy third-party workloads without project-issued
      signatures.
spec:
  validationFailureAction: Enforce
  background: true
  failurePolicy: Fail
  # Cosign keyless verification can take 5-8s on a cold cache; allow headroom
  # over the 10s admission default.
  webhookTimeoutSeconds: 30
  # Namespace scoping is enforced per-rule via match.any[].resources.namespaces.
  # A spec.webhookConfiguration.matchConditions block was removed because the
  # Kyverno CLI test/apply runner panics on it (CLI does not exercise webhook
  # config); admission-time scoping is fully covered by the per-rule match.
  rules:
    - name: require-signed-images-acr
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - osmo-workflows
                - azureml
                - dataviewer
                - "fleet-*"
      verifyImages:
        - imageReferences:
            - "${ACR_LOGIN_SERVER}/*"
          failureAction: Enforce
          required: true
          verifyDigest: true
          mutateDigest: true
          useCache: true
          cosignOCI11: true
          # Private-ACR signature fetch uses the Kyverno controllers' Azure
          # workload identity (AcrPull on the registry); no stored credential.
          imageRegistryCredentials:
            helpers:
              - azure
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/microsoft/physical-ai-toolchain/.github/workflows/container-publish.yml@refs/heads/main"
                    subjectRegExp: "^https://github\\.com/microsoft/physical-ai-toolchain/\\.github/workflows/container-publish\\.yml@refs/(heads/main|tags/v.+)$"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: audit-all-other-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "*"
          skipImageReferences:
            - "${ACR_LOGIN_SERVER}/*"
          failureAction: Audit
          required: false
          verifyDigest: false
          mutateDigest: false
          useCache: true
          # Private-ACR signature fetch uses the Kyverno controllers' Azure
          # workload identity (AcrPull on the registry); no stored credential.
          imageRegistryCredentials:
            helpers:
              - azure
          attestors:
            - count: 1
              entries:
                - keyless:
                    subjectRegExp: ".*"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: "https://rekor.sigstore.dev"
