# NVIDIA Kubernetes device plugin.
#
# Advertises the Jetson AGX Orin integrated GPU to k3s as the schedulable
# resource `nvidia.com/gpu`. Without this DaemonSet the node reports zero GPUs
# and any pod requesting `nvidia.com/gpu` (e.g. gr00t-inference) stays Pending.
#
# k3s already auto-registered the `nvidia` containerd runtime
# (/usr/bin/nvidia-container-runtime) and a `nvidia` RuntimeClass exists, so the
# plugin pod runs under runtimeClassName: nvidia to gain GPU access for NVML.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      runtimeClassName: nvidia
      priorityClassName: system-node-critical
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        # Tolerate control-plane taint so it runs on a single-node k3s cluster.
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.1
          env:
            # Jetson/Tegra: don't crash the plugin if NVML init is flaky; keep
            # retrying so the GPU eventually registers.
            - name: FAIL_ON_INIT_ERROR
              value: "false"
            # Inject explicit device specs into containers; required on Tegra
            # where the integrated GPU is exposed via the nvidia runtime.
            - name: PASS_DEVICE_SPECS
              value: "true"
            # Force the Tegra discovery strategy on every node. The default
            # "auto" strategy can pick the NVML path on newer Jetsons (e.g.
            # Jetson Thor), where NVML's memory query returns "Not Supported"
            # and the plugin crashes with
            # "error getting device memory: Not Supported". The integrated
            # Tegra GPU has no discrete VRAM to enumerate, so the tegra
            # strategy is the correct choice for all Jetson nodes.
            - name: DEVICE_DISCOVERY_STRATEGY
              value: "tegra"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
