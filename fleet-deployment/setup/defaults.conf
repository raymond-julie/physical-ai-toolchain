# Defaults for build-aml-model-image.sh.
# Every key uses the ${VAR:-default} pattern so .env.local (auto-sourced by
# scripts/lib/common.sh) and direct shell exports both win over the literal.
# Each DEFAULT_* sits BELOW Terraform outputs in the resolver:
#   Terraform output  >  CLI flag  >  DEFAULT_* env var  >  literal default below  >  fatal
# To force CLI/env values to win against a workspace with Terraform state,
# pass --tf-dir none (or any non-existent path).

# Terraform discovery directory. Pass --tf-dir none to disable discovery entirely.
DEFAULT_TF_DIR="${DEFAULT_TF_DIR:-../../infrastructure/terraform}"

# AML side (blank = expect Terraform to provide; required values fatal if still empty).
DEFAULT_AML_SUBSCRIPTION_ID="${DEFAULT_AML_SUBSCRIPTION_ID:-}"
DEFAULT_AML_TENANT_ID="${DEFAULT_AML_TENANT_ID:-}"
DEFAULT_AML_RESOURCE_GROUP="${DEFAULT_AML_RESOURCE_GROUP:-}"
DEFAULT_AML_WORKSPACE_NAME="${DEFAULT_AML_WORKSPACE_NAME:-}"
DEFAULT_AML_MODEL_NAME="${DEFAULT_AML_MODEL_NAME:-}"
DEFAULT_AML_MODEL_VERSION="${DEFAULT_AML_MODEL_VERSION:-latest}"

# ACR side (blank = expect Terraform to provide for same-tenant; in cross-tenant
# or Terraform-optional mode the operator MUST set these or pass --acr-* flags).
DEFAULT_ACR_SUBSCRIPTION_ID="${DEFAULT_ACR_SUBSCRIPTION_ID:-}"
DEFAULT_ACR_TENANT_ID="${DEFAULT_ACR_TENANT_ID:-}"
DEFAULT_ACR_NAME="${DEFAULT_ACR_NAME:-}"

# AKV side (only consulted when verify-mode=notation). Falls back to ACR
# tenant/subscription when blank.
DEFAULT_AKV_SUBSCRIPTION_ID="${DEFAULT_AKV_SUBSCRIPTION_ID:-}"
DEFAULT_AKV_TENANT_ID="${DEFAULT_AKV_TENANT_ID:-}"
DEFAULT_AKV_KEY_URI="${DEFAULT_AKV_KEY_URI:-}"
# Set true only for dev/test self-signed signing certs; production uses a
# CA-issued certificate chain (self_signed=false). Overridden by --akv-self-signed.
DEFAULT_AKV_SELF_SIGNED="${DEFAULT_AKV_SELF_SIGNED:-false}"

# Image build defaults.
# DEFAULT_IMAGE_REPO blank = use ${model_name} (one ACR repo per model_name; see Resolved
# Decision #16 + Fleet Image-Reference Contract). Set explicitly to share one repo across
# multiple models (governance trade-off).
DEFAULT_IMAGE_REPO="${DEFAULT_IMAGE_REPO:-}"
DEFAULT_DOCKERFILE="${DEFAULT_DOCKERFILE:-./Dockerfile.inference}"
# Target platform for buildx (single platform per build). Edge fleet nodes are
# predominantly linux/amd64 (AKS Edge Essentials, Arc-enabled VMs); override to
# linux/arm64 for Jetson / ARM SBC targets.
DEFAULT_IMAGE_PLATFORM="${DEFAULT_IMAGE_PLATFORM:-linux/amd64}"
# 'scratch' base: image is a passive carrier mounted into pods via OCI image
# volumes (KEP-4639). No OS, no packages, no executable runtime — therefore
# no scannable CVE surface. The committed VEX at
# security/vex/inference-base.openvex.json reflects this (zero statements).
# Override to a runnable base only if a future variant of the image needs to
# execute (then re-run scripts/security/generate-vex.sh and triage the result).
DEFAULT_INFERENCE_BASE_IMAGE="${DEFAULT_INFERENCE_BASE_IMAGE:-scratch}"

# Signing mode (overridden by Terraform output signing_mode.value when present;
# auto-falls-back to 'none' with a warning when verify-image.sh is missing).
# sigstore | notation | none
DEFAULT_VERIFY_MODE="${DEFAULT_VERIFY_MODE:-sigstore}"

# Optional OpenVEX statement attached as cosign attestation (sigstore only).
DEFAULT_VEX_FILE="${DEFAULT_VEX_FILE:-../../security/vex/inference-base.openvex.json}"
